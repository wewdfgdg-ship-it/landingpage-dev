name: Telegram Notification

on:
  pull_request:
    types: [opened, ready_for_review]
  push:
    branches-ignore:
      - main
      - master

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send Telegram Notification
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Check if sessions.md exists and was changed
          if [ -f ".claude/sessions.md" ]; then
            # Send sessions file content (max 4000 chars for telegram)
            SESSIONS=$(head -c 4000 .claude/sessions.md)
            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg chat "$TG_CHAT" --arg text "$SESSIONS" '{chat_id: $chat, text: $text, disable_web_page_preview: true}')"
          fi

          # 한국어 알림
          REPO="${{ github.repository }}"
          PROJECT=$(echo "$REPO" | sed 's|.*/||')

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TITLE="${{ github.event.pull_request.title }}"
            URL="${{ github.event.pull_request.html_url }}"
            MSG=$(printf "📋 PR 생성: ${TITLE}\n프로젝트: ${PROJECT}\n${URL}")
          else
            BRANCH="${{ github.ref_name }}"
            SESSION=$(echo "$BRANCH" | sed 's|session/||')
            COMMIT_MSG=$(echo '${{ github.event.head_commit.message }}' | head -c 500)
            MSG=$(printf "🚀 푸시 완료\n프로젝트: ${PROJECT}\n세션: ${SESSION}\n내용: ${COMMIT_MSG}")
          fi
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg chat "$TG_CHAT" --arg text "$MSG" '{chat_id: $chat, text: $text, disable_web_page_preview: true}')"
