name: Telegram Notification

on:
  pull_request:
    types: [opened, ready_for_review]
  push:
    branches-ignore:
      - main
      - master

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Notification
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            MSG="PR: ${{ github.event.pull_request.title }}\n${{ github.repository }}\n${{ github.event.pull_request.html_url }}"
          else
            BRANCH="${{ github.ref_name }}"
            REPO="${{ github.repository }}"
            MSG="Push: ${REPO}\nBranch: ${BRANCH}\nCommit: ${{ github.event.head_commit.message }}"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${{ secrets.TELEGRAM_CHAT_ID }}\",\"text\":\"${MSG}\",\"disable_web_page_preview\":true}"
