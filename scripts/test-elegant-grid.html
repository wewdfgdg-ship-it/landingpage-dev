<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>레퍼런스(우아한 그리드) 1:1 완벽 클론 테스트</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Pretendard", sans-serif; overflow-x: hidden; background-color: #f0f0f0; }

/* 템플릿 CSS (배경 이미지를 CSS 변수로 주입) */
:root {
  --eg-bg-image: url('https://images.unsplash.com/photo-1540518614846-7eded433c457?auto=format&fit=crop&q=80&w=1200'); /* 침구/따뜻한 방 톤의 배경 */
}

.eg-wrapper {
    position: relative;
    width: 100%;
    min-height: 900px;
    background-color: #5a554a; /* 기본 배경색 (이미지 로딩 전) */
    /* CSS 변수로 이미지 URL을 넘겨받아 배경으로 사용 (템플릿 엔진 외부에서 주입하거나 아래 기본값 사용) */
    background-image: var(--eg-bg-image, url('https://images.unsplash.com/photo-1540518614846-7eded433c457?auto=format&fit=crop&q=80&w=1200'));
    background-size: cover;
    background-position: center;
    background-attachment: fixed; /* 패럴랙스 느낌의 고정 배경 */
    font-family: "Pretendard", -apple-system, sans-serif;
    display: flex;
    justify-content: center;
    padding: 6rem 0 8rem 0;
}

/* 어두운 틴트 오버레이 (사진을 살짝 어둡고 탁하게 눌러서 흰색 글씨/카드가 돋보이게) */
.eg-bg-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(40, 35, 30, 0.4); /* 따뜻한 웜그레이 톤의 반투명 오버레이 */
    z-index: 1;
}

.eg-container {
    width: 100%;
    max-width: 1280px;
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 5%;
}

.eg-header {
    text-align: center;
    margin-bottom: 3rem;
    color: #ffffff;
}

.eg-step-number {
    font-size: 1.4rem;
    font-weight: 800;
    margin-bottom: 0.2rem;
    letter-spacing: 0.05em;
}

.eg-headline {
    font-size: 3.8rem;
    font-weight: 900;
    margin: 0 0 0.5rem 0;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.eg-subheadline {
    font-size: 1.25rem;
    font-weight: 500;
    color: #eeeeee;
    letter-spacing: -0.02em;
}

/* 흰색 2x2 카드 보드 */
.eg-card-board {
    width: 100%;
    max-width: 700px; /* 카드가 너무 넓어지지 않게 고정 */
    background-color: rgba(255, 255, 255, 0.98); /* 거의 불투명한 화이트 (아주 살짝 뒤가 비치는 느낌) */
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    display: grid;
    grid-template-columns: 1fr 1fr;
    /* 테두리(보더)는 각 item에 개별 적용하여 안쪽 십자 선만 그리도록 세팅 */
}

.eg-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 4rem 2.5rem;
    text-align: center;
}

/* 십자선 (내부 경계선) 구현용 얇은 회색 테두리 */
.eg-border-right {
    border-right: 1px solid rgba(0,0,0,0.08);
}
.eg-border-bottom {
    border-bottom: 1px solid rgba(0,0,0,0.08);
}

.eg-icon-wrap {
    width: 70px;
    height: 70px;
    margin-bottom: 1.5rem;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* SVG 아이콘 얇게, 회색조로 설정 (레퍼런스 느낌) */
.eg-icon-wrap svg {
    max-width: 100%;
    max-height: 100%;
    stroke: #666;
    stroke-width: 1.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
}

.eg-text-wrap {
    font-size: 0.95rem;
    font-weight: 400;
    color: #666666;
    line-height: 1.6;
    letter-spacing: -0.05em;
    word-break: keep-all;
}

/* 제목/강조 텍스트용 클래스 */
.eg-item-title {
    display: block;
    font-size: 1.25rem;
    font-weight: 700;
    color: #333333;
    margin-bottom: 0.8rem;
    letter-spacing: -0.05em;
}

/* 본문 중 강조되는 단어의 연한 형광펜 효과 (선택사항) */
.eg-highlight {
    font-weight: 600;
    color: #222;
    box-shadow: inset 0 -8px 0 rgba(200,200,200,0.3);
}

.hc-animate-fade-in-up {
    animation: hc-fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
    transform: translateY(30px);
}
@keyframes hc-fadeInUp {
    from { opacity: 0; transform: translateY(40px) }
    to { opacity: 1; transform: translateY(0) }
}

@media (max-width: 768px) {
    .eg-wrapper { padding: 4rem 0 5rem 0; min-height: auto; }
    .eg-step-number { font-size: 1.1rem; }
    .eg-headline { font-size: 2.8rem; }
    .eg-subheadline { font-size: 1.1rem; }
    
    .eg-card-board { 
        grid-template-columns: 1fr; /* 모바일에서는 1열로 변경 */
        max-width: 90%;
    }
    
    /* 모바일 1열일 때는 십자선 대신 밑줄만 남김 */
    .eg-border-right { border-right: none; }
    .eg-item:not(:last-child) { border-bottom: 1px solid rgba(0,0,0,0.08); }
    
    .eg-item { padding: 3rem 1.5rem; }
}


/* 와이드 랜딩페이지 래퍼 디자인 */
.desktop-wrapper {
    width: 100%;
    margin: 0 auto;
    background-color: #fff;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
}
</style>
</head>
<body>
    <div style="text-align:center; padding: 20px 0; font-weight:bold; color:#777;">레퍼런스(03-본문-FABRIC) 데스크탑 모드 클론 뷰어</div>
    
    <div class="desktop-wrapper">
        
<section class="eg-wrapper">
    <!-- 배경 이미지 오버레이 플랫 -->
    <div class="eg-bg-overlay"></div>
    
    <div class="eg-container">
        <!-- Top Header -->
        <div class="eg-header hc-animate-fade-in-up">
            
            <div class="eg-step-number">02</div>
            
            
            <h2 class="eg-headline">FABRIC</h2>
            
            
            <div class="eg-subheadline">친환경 소재</div>
            
        </div>

        <!-- 2x2 White Card Grid -->
        <div class="eg-card-board hc-animate-fade-in-up" style="animation-delay: 200ms;">
            
            <!-- Item 1 -->
            <div class="eg-item eg-border-right eg-border-bottom">
                
                <div class="eg-icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
       <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
     </svg></div>
                
                <div class="eg-text-wrap"><span class="eg-item-title">100% 친환경 소재</span>
     인체에 무해한 <span class="eg-highlight">친환경</span><br>
     <span class="eg-highlight">소재</span>로 세탁 후에도<br>
     동일 성능을 오래 유지</div>
            </div>
            
            <!-- Item 2 -->
            <div class="eg-item eg-border-bottom">
                
                <div class="eg-icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
       <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/>
     </svg></div>
                
                <div class="eg-text-wrap"><span class="eg-item-title">부드러운 촉감</span>
     극세 섬유 원단을<br>
     사용하여 <span class="eg-highlight">매끄럽고</span><br>
     <span class="eg-highlight">부들부들한 촉감</span></div>
            </div>

            <!-- Item 3 -->
            <div class="eg-item eg-border-right">
                
                <div class="eg-icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
       <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/><path d="M12 7v5"/>
     </svg></div>
                
                <div class="eg-text-wrap"><span class="eg-item-title">신체 온도 3-5° UP</span>
     열에너지를 흡수해주는<br>
     특수 발열 가공<br>
     처리로 <span class="eg-highlight">신체온도가</span><br>
     <span class="eg-highlight">3-5도 오르는 효과</span></div>
            </div>

            <!-- Item 4 -->
            <div class="eg-item">
                
                <div class="eg-icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
       <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
       <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
       <line x1="12" y1="22.08" x2="12" y2="12"/>
     </svg></div>
                
                <div class="eg-text-wrap"><span class="eg-item-title">국내 생산</span>
     저가의 해외제품과는<br>
     달리 꼼꼼한 검수를 거쳐<br>
     제작되며 <span class="eg-highlight">한국인 체형에</span><br>
     <span class="eg-highlight">맞는 사이즈 보장</span></div>
            </div>
            
        </div>
    </div>
</section>

    </div>
</body>
</html>
