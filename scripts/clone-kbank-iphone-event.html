<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K-Bank Event Clone</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Pretendard', sans-serif; background: #222; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    
    /* 전체 컨테이너 (모바일 포스터 비율 유지) */
    .promo-container { width: 100%; max-width: 500px; background-color: #f1f2f4; position: relative; overflow: hidden; height: auto; min-height: 900px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
    
    /* V 형태 하이라이트 배경 (위/아래 교차되는 하얀 삼각형) */
    .bg-top-triangle { position: absolute; top: 0; left: 0; right: 0; height: 50%; background-color: #ffffff; clip-path: polygon(0 0, 100% 0, 50% 100%); z-index: 0; }
    .bg-bottom-triangle { position: absolute; bottom: 0; left: 0; right: 0; height: 50%; background-color: #ffffff; clip-path: polygon(50% 0, 100% 100%, 0 100%); z-index: 0; }
    
    .content-layer { position: relative; z-index: 10; display: flex; flex-direction: column; height: 100%; justify-content: space-between; padding: 40px 0; }

    /* 로고 영역 */
    .logo-box { border: 1.5px solid #888; border-radius: 3px; padding: 0 4px; display: inline-flex; align-items: center; justify-content: center; height: 22px; font-weight: 900; }

    /* 스마트폰 스택 영역 */
    .phone-container { position: relative; width: 100%; height: 380px; display: flex; justify-content: center; align-items: center; margin-top: 10px; margin-bottom: 20px; }
    
    /* 폰 베이스 공통 */
    .iphone { width: 170px; height: 340px; background: #333; border-radius: 28px; border: 4px solid #999; position: absolute; left: 50%; transform: translateX(-50%); box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; justify-content: center; padding: 4px; z-index: 10;}
    .iphone-screen { width: 100%; height: 100%; border-radius: 20px; position: relative; overflow: hidden; background: linear-gradient(125deg, #e4165b 0%, #f77c3f 30%, #fdf6ec 55%, #465ec4 100%); }
    .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 70px; height: 14px; background: #333; border-bottom-left-radius: 10px; border-bottom-right-radius: 10px; }

    /* 메인 정중앙 폰 */
    .iphone.main { z-index: 15; width: 180px; height: 360px; border: 5px solid #222; border-radius: 34px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); padding: 5px; }
    .iphone.main .notch { width: 80px; height: 16px; background: #222; }
    .iphone.main .iphone-screen { border-radius: 24px; background: linear-gradient(125deg, #ec1363 0%, #fa7143 30%, #fdf4e8 55%, #4a54c4 100%); }

    /* 배경 잔상 폰들 (왼쪽/오른쪽 대칭 배열) */
    .iphone.ghost .iphone-screen { opacity: 0.9; filter: saturate(0.8) brightness(1.1); }
    .iphone.l1 { transform: translateX(calc(-50% - 70px)) scale(0.92); z-index: 9; border-color: #888; }
    .iphone.l2 { transform: translateX(calc(-50% - 130px)) scale(0.85); z-index: 8; border-color: #aaa; }
    .iphone.l3 { transform: translateX(calc(-50% - 180px)) scale(0.78); z-index: 7; border-color: #ccc; }
    .iphone.l4 { transform: translateX(calc(-50% - 220px)) scale(0.72); z-index: 6; border-color: #ddd; }
    
    .iphone.r1 { transform: translateX(calc(-50% + 70px)) scale(0.92); z-index: 9; border-color: #888; }
    .iphone.r2 { transform: translateX(calc(-50% + 130px)) scale(0.85); z-index: 8; border-color: #aaa; }
    .iphone.r3 { transform: translateX(calc(-50% + 180px)) scale(0.78); z-index: 7; border-color: #ccc; }
    .iphone.r4 { transform: translateX(calc(-50% + 220px)) scale(0.72); z-index: 6; border-color: #ddd; }

    /* 10대 추첨 레드 말풍선 */
    .red-bubble {
      position: absolute; top: -15px; right: -25px; width: 95px; height: 95px; background: #df4f4b; border-radius: 50%;
      color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20;
      box-shadow: 0 15px 25px rgba(219, 75, 75, 0.4);
    }
    .red-bubble::after {
      content: ''; position: absolute; bottom: -6px; left: 18px; width: 0; height: 0;
      border-left: 20px solid transparent; border-right: 5px solid transparent; border-top: 25px solid #df4f4b;
      transform: rotate(35deg);
    }

  </style>
</head>
<body>

<div class="promo-container">
  <!-- 배경 X(크로스) 빛 반사 효과 (상/하얀색 쐐기 형태) -->
  <div class="bg-top-triangle"></div>
  <div class="bg-bottom-triangle"></div>

  <!-- 메인 콘텐츠 영역 -->
  <div class="content-layer">
    
    <!-- [1] 상단 텍스트 및 로고 영역 -->
    <div class="w-full px-8 flex flex-col items-center text-center">
      
      <!-- 상단 우측 로고 -->
      <div class="w-full flex justify-end mb-12">
        <div class="text-[22px] text-[#888] tracking-tighter flex items-center gap-[2px]">
          <div class="logo-box">K</div> <span class="font-bold -mb-1">bank</span>
        </div>
      </div>

      <!-- EVENT 뱃지 및 서브타이틀 -->
      <div class="border-y border-[#a3a3a3] py-[2px] px-2 text-[#757575] font-bold text-[14px] tracking-[0.05em] mb-4 inline-block">EVENT</div>
      <p class="text-[#757575] font-medium text-[18px] tracking-[-0.03em] mb-10">주거래우대 정기예금 출시 기념 이벤트</p>

      <!-- 핵심 카피 (케이뱅크 단골 고객이면...) -->
      <h2 class="text-[34px] text-[#4a4a4a] font-medium tracking-[-0.05em] leading-[1.1] mb-2">케이뱅크 단골 고객이면</h2>
      <h1 class="text-[52px] font-black tracking-[-0.05em] leading-[1.1] mb-2 text-[#4a4a4a]">
        <span class="text-[#df4f4b]">iPhone X</span> <span class="font-medium text-[44px]">정도</span>
      </h1>
      <h1 class="text-[60px] font-black tracking-[-0.05em] leading-[1.1] text-[#4a4a4a] mb-8">들어줘야!</h1>

      <!-- 이벤트 기간 -->
      <p class="text-[17px] text-[#757575] font-bold tracking-widest">2017.09.26 - 11.30</p>
    </div>

    <!-- [2] 중앙 아이폰 다중 스크린 랜더링 영역 -->
    <div class="phone-container">
      
      <!-- 뒤쪽에 흐릿하게 깔리는 좌/우 8대의 기기 -->
      <div class="iphone ghost l4"><div class="iphone-screen"><div class="notch"></div></div></div>
      <div class="iphone ghost l3"><div class="iphone-screen"><div class="notch"></div></div></div>
      <div class="iphone ghost l2"><div class="iphone-screen"><div class="notch"></div></div></div>
      <div class="iphone ghost l1"><div class="iphone-screen"><div class="notch"></div></div></div>
      
      <div class="iphone ghost r4"><div class="iphone-screen"><div class="notch"></div></div></div>
      <div class="iphone ghost r3"><div class="iphone-screen"><div class="notch"></div></div></div>
      <div class="iphone ghost r2"><div class="iphone-screen"><div class="notch"></div></div></div>
      <div class="iphone ghost r1"><div class="iphone-screen"><div class="notch"></div></div></div>

      <!-- 제일 앞 중앙의 메인 아이폰 -->
      <div class="iphone main">
        <div class="iphone-screen"><div class="notch"></div></div>
        
        <!-- 빨간색 말풍선 뱃지 -->
        <div class="red-bubble">
          <span class="text-[15px] font-bold tracking-tight mb-[-6px] z-10">무려</span>
          <span class="text-[34px] font-black z-10">10대</span>
        </div>
      </div>

    </div>

    <!-- [3] 하단 액션 유도 및 해시태그 안내 -->
    <div class="w-full px-8 text-center flex flex-col items-center z-10">
      <p class="text-[20px] text-[#4a4a4a] font-medium tracking-tight mb-3">
        주거래우대 정기예금 가입하고 <span class="font-black text-[22px]">iPhone X</span> 받자!
      </p>
      
      <p class="text-[#df4f4b] font-medium text-[16px] tracking-tight mb-[2px]">
        #급여이체 + 체크카드 = 금리우대
      </p>
      <p class="text-[#df4f4b] font-medium text-[16px] tracking-tight">
        #금리비교자신 #1년기준 최고 연 2.2%
      </p>
    </div>

  </div>
</div>

</body>
</html>
