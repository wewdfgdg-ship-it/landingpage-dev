<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>레퍼런스(스팀 특징 6열) 1:1 완벽 클론 테스트</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Pretendard", sans-serif; overflow-x: hidden; background-color: #f0f0f0; }

/* 템플릿 CSS */

.sf-wrapper {
    position: relative;
    width: 100%;
    background-color: #3b68c9; /* 청량하고 신뢰감 있는 블루 배경 */
    font-family: "Pretendard", -apple-system, sans-serif;
    display: flex;
    justify-content: center;
    overflow: hidden;
    padding: 5rem 0 6rem 0;
}

.sf-container {
    width: 100%;
    max-width: 600px; /* 리스트형 핵심특징은 시선이 퍼지지 않게 좁은 폭을 유지 */
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 5;
    padding: 0 5%;
}

.sf-header {
    text-align: center;
    margin-bottom: 2.5rem;
    width: 100%;
}

.sf-subheadline {
    font-size: 1.4rem;
    font-weight: 700;
    color: #1f376a; /* 짙은 네이비 톤으로 서브타이틀 구성 (투명도 느낌) */
    margin-bottom: 0.3rem;
    letter-spacing: -0.04em;
}

.sf-headline {
    font-size: 2.8rem;
    font-weight: 850;
    color: #ffffff; /* 하얀색 포인트 메인 타이틀 */
    margin: 0;
    letter-spacing: -0.05em;
    line-height: 1.2;
}

.sf-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 0.8rem; /* 카드 사이의 좁은 간격 */
}

.sf-card {
    width: 100%;
    background-color: #ffffff;
    border-radius: 12px; /* 둥근 알약 같은 느낌의 화이트 둥근 사각형 */
    padding: 1.2rem 1.5rem;
    display: flex;
    align-items: center;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.sf-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
}

.sf-icon {
    width: 60px;
    height: 60px;
    flex-shrink: 0;
    margin-right: 1.5rem;
    display: flex;
    justify-content: center;
    align-items: center;
}

.sf-icon svg {
    width: 100%;
    height: 100%;
    stroke: #555555; /* 회색조 아이콘 라인 */
    stroke-width: 1.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
}

.sf-text {
    flex-grow: 1;
    font-size: 1.3rem;
    font-weight: 700;
    color: #222222;
    line-height: 1.35;
    letter-spacing: -0.05em;
    word-break: keep-all;
}

.hc-animate-fade-in-up {
    animation: hc-fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
    transform: translateY(20px);
}
@keyframes hc-fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 768px) {
    .sf-wrapper { padding: 4rem 0 5rem 0; }
    .sf-subheadline { font-size: 1.1rem; }
    .sf-headline { font-size: 2.2rem; }
    .sf-card { padding: 1rem 1.2rem; border-radius: 10px; }
    .sf-icon { width: 45px; height: 45px; margin-right: 1rem; }
    .sf-text { font-size: 1.1rem; }
}


/* 와이드 랜딩페이지 래퍼 디자인 */
.desktop-wrapper {
    width: 100%;
    margin: 0 auto;
    background-color: #fff;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
}
</style>
</head>
<body>
    <div style="text-align:center; padding: 20px 0; font-weight:bold; color:#777;">레퍼런스(블루 스팀 6열 리스트) 데스크탑 모드 클론 뷰어</div>
    
    <div class="desktop-wrapper">
        
<section class="sf-wrapper">
    <div class="sf-container">
        <!-- Header -->
        <div class="sf-header hc-animate-fade-in-up">
            
            <div class="sf-subheadline">진짜 100°C 가열로 살균된</div>
            
            
            <h2 class="sf-headline">더 순수한 스팀</h2>
        </div>

        <!-- Vertical Feature List -->
        <div class="sf-list">
            
            <!-- Item 1 -->
            
            <div class="sf-card hc-animate-fade-in-up" style="animation-delay: 100ms;">
                <div class="sf-icon"><svg viewBox="0 0 100 100">
       <path d="M25 45 V70 C25 80, 75 80, 75 70 V45" />
       <path d="M20 45 H80" />
       <path d="M25 45 C35 35, 65 35, 75 45" />
       <!-- Steam lines -->
       <path d="M40 30 Q35 25 40 20 T40 10 M50 32 Q45 25 52 18 T50 8 M60 30 Q55 25 60 20 T60 10" stroke-width="2" />
     </svg></div>
                <div class="sf-text">진짜 100°C 가열로 순수한 스팀</div>
            </div>
            

            <!-- Item 2 -->
            
            <div class="sf-card hc-animate-fade-in-up" style="animation-delay: 150ms;">
                <div class="sf-icon"><svg viewBox="0 0 100 100">
       <!-- Cylinder -->
       <path d="M25 35 C25 25, 75 25, 75 35 V65 C75 75, 25 75, 25 65 Z" />
       <path d="M25 35 C25 45, 75 45, 75 35" />
       <!-- Arrows -->
       <path d="M35 45 L40 50 M35 45 V52 M35 45 H42" />
       <path d="M65 45 L60 50 M65 45 V52 M65 45 H58" />
       <path d="M35 60 L40 55 M35 60 V53 M35 60 H42" />
       <path d="M65 60 L60 55 M65 60 V53 M65 60 H58" />
     </svg></div>
                <div class="sf-text">만수 4.5L (최대 3.5L)<br>대용량 물탱크</div>
            </div>
            

            <!-- Item 3 -->
            
            <div class="sf-card hc-animate-fade-in-up" style="animation-delay: 200ms;">
                <div class="sf-icon"><svg viewBox="0 0 100 100">
       <!-- Circle tank top view -->
       <circle cx="50" cy="55" r="25" />
       <circle cx="50" cy="55" r="30" stroke-dasharray="8 6" />
       <!-- Handle lifting -->
       <path d="M30 40 Q50 30 70 40 L70 35 Q50 20 20 35 Z" />
       <!-- Hand drawing simplified -->
       <path d="M10 32 C15 32, 20 38, 20 45 M10 32 C10 25, 30 20, 30 35" />
     </svg></div>
                <div class="sf-text">완벽 분리 가능 STS 304<br>물탱크&클린커버</div>
            </div>
            

            <!-- Item 4 -->
            
            <div class="sf-card hc-animate-fade-in-up" style="animation-delay: 250ms;">
                <div class="sf-icon"><svg viewBox="0 0 100 100">
       <!-- Bars -->
       <rect x="20" y="60" width="10" height="20" />
       <rect x="35" y="50" width="10" height="30" />
       <rect x="50" y="35" width="10" height="45" />
       <!-- Arrow -->
       <path d="M20 50 L75 20 M75 20 V35 M75 20 H60" stroke-width="2" />
       <!-- Base line -->
       <path d="M15 80 H85" />
     </svg></div>
                <div class="sf-text">3단계 가습 조절 가능 최대<br>600ml/h 분무량</div>
            </div>
            

            <!-- Item 5 -->
            
            <div class="sf-card hc-animate-fade-in-up" style="animation-delay: 300ms;">
                <div class="sf-icon"><svg viewBox="0 0 100 100">
       <!-- Shackle -->
       <path d="M30 45 V35 C30 20, 70 20, 70 35 V45" />
       <!-- Body -->
       <rect x="20" y="45" width="60" height="40" rx="3" />
       <!-- Keyhole -->
       <circle cx="50" cy="60" r="4" />
       <path d="M48 62 L48 72 H52 L52 62" />
     </svg></div>
                <div class="sf-text">2중 잠금 키즈락 적용</div>
            </div>
            

            <!-- Item 6 -->
            
            <div class="sf-card hc-animate-fade-in-up" style="animation-delay: 350ms;">
                <div class="sf-icon"><svg viewBox="0 0 100 100">
       <!-- Inner Shield -->
       <path d="M50 25 L32 32 V50 C32 65, 50 78, 50 78 C50 78, 68 65, 68 50 V32 Z" />
       <!-- Checkmark -->
       <path d="M42 55 L48 60 L60 45" stroke-width="2" />
       <!-- Outer Shield -->
       <path d="M50 15 L25 25 V50 C25 70, 50 85, 50 85 C50 85, 75 70, 75 50 V25 Z" />
     </svg></div>
                <div class="sf-text">스팀이 지나는 모든 통로<br>안심 소재 사용</div>
            </div>
            
            
            <!-- Item 6 (using some other slots if needed, or we just rely on template engine loop for more. But template engine limits to bullet.0~9. We'll support 5 items via bullets, or we can add extra if we update the template engine. Let's assume up to 5 is fine using bullets, but we can do 6 if we use body/cta for data, but let's just stick to 5 or modify engine. Actually, let's keep it strictly bullet.0 ~ bullet.9 for 5 items. We will display 5 items in the clone.) -->
            
        </div>
    </div>
</section>

    </div>
</body>
</html>
