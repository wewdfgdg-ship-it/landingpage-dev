<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>웰라쥬 앰플 - 줄바꿈 강제 맞춤 시스템</title>
  <style>
    /* Reset & Base */
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: #eef2f5;
      font-family: 'Pretendard', -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .poster {
      position: relative;
      width: 100%;
      max-width: 600px;
      /* aspectRatio 설정 해제. 브라우저 크기에 대응되게 함 */
      min-height: 900px;
      overflow: hidden;
      background: linear-gradient(180deg, #1b68ea 0%, #308cf2 30%, #5fbafb 70%, #87cfff 100%);
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 텍스트 영역: 중앙 정렬 & 최대 너비 제한 (원본 맞춤) */
    .header {
      width: 100%;
      padding: 40px 20px 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center; /* 핵심: 무조건 가운데 정렬 */
    }

    /* 
      1번째 줄 (웰라쥬 재구매율 1위*)
      - 내용물이 한 줄로 다 들어갈 수 있으면 가운데 정렬 1줄
      - 넘어갈 거 같으면 글자 단위로 깔끔하게 꺾이기 (word-break: keep-all)
    */
    .line1 {
      font-size: clamp(32px, 8vw, 54px); /* 글씨가 너무 커져서 찢어지지 않도록 최솟값/최댓값 설정 */
      font-weight: 900;
      color: #ffffff;
      letter-spacing: -2px;
      line-height: 1.3;
      text-align: center;
      word-break: keep-all; /* 단어 단위로 끊어짐 방지 (예: 재구 / 매율 -> 재구매율 유지) */
      margin-bottom: 20px;
      display: inline-flex;
      flex-wrap: wrap; /* ⭐ 핵심: 박스(1위*)가 텍스트와 겹치지 않고 자연스럽게 다음 줄로 떨어지게 함 */
      justify-content: center;
      align-items: center;
      gap: 12px; /* 텍스트와 파란 박스 사이 간격 */
    }
    
    .line1 .box-blue {
      background-color: #0d3bca;
      padding: 4px 16px;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
      white-space: nowrap; /* 박스 안의 글씨는 절대 깨지지 않음 */
    }

    /* 
      2번째 줄 (기존 앰플 대비 | **100배 대용량)
      - 마찬가지로 flex-wrap을 주어 공간 부족 시 덩어리 단위로 정렬 맞춤 낙하 
    */
    .line2 {
      font-size: clamp(24px, 6vw, 42px);
      font-weight: 300;
      color: #e0f0ff;
      letter-spacing: -1px;
      line-height: 1.4;
      display: inline-flex;
      flex-wrap: wrap; /* ⭐ 핵심: 공간 부족 시 덩어리째 다음 줄 중앙으로 떨어짐 */
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 10px;
    }

    .line2 .divider {
      color: rgba(255,255,255,0.4);
      font-weight: 100;
    }

    .line2 .box-blue {
      background-color: #0d3bca;
      font-weight: 900;
      color: #ffffff;
      padding: 4px 14px;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
      white-space: nowrap;
    }

    .line2 .bold-text {
      font-weight: 600;
      color: #ffffff;
      white-space: nowrap;
    }

    /* 각주 텍스트 - 가운데 정렬로 변경 (우측 딱 붙으면 반응형 시 깨짐) */
    .footnotes {
      margin-top: 15px;
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.8);
      font-weight: 400;
      line-height: 1.4;
      word-break: keep-all;
      padding: 0 20px;
      z-index: 10;
    }

    /* 배경 글자 - 앵커 포인트를 중앙으로 잡아서 화면이 좁아져도 밀리지 않게 */
    .giant-text-container {
      position: absolute;
      top: 250px;
      width: 100%;
      height: 400px;
      z-index: 2;
      pointer-events: none;
    }

    .giant-text {
      position: absolute;
      font-weight: 900;
      color: #ffffff;
      line-height: 1;
      text-shadow: 0 10px 30px rgba(27, 104, 234, 0.4);
      transform: translateX(-50%); /* 가로 중앙 기준점 */
    }

    .bg-am { top: 0; left: 30%; font-size: 160px; }
    .bg-ple { top: 0; left: 70%; font-size: 160px; }
    .bg-1 { top: 200px; left: 30%; font-size: 260px; letter-spacing: -10px; transform: translateX(-50%) scaleY(1.1); }
    .bg-wi { top: 280px; left: 70%; font-size: 190px; }
    .bg-wi .star { position: absolute; top: -10px; right: -30px; font-size: 80px; }

    /* 모바일 타겟 미디어 쿼리 (< 400px) : 디자인 파괴 방지 */
    @media (max-width: 450px) {
      .bg-am { font-size: 120px; left: 35%; }
      .bg-ple { font-size: 120px; left: 65%; }
      .bg-1 { font-size: 200px; top:180px; left: 35%; }
      .bg-wi { font-size: 140px; top: 220px; left: 65%; }
    }

    /* 단상 규격 비례화 */
    .pedestal {
      position: absolute;
      bottom: -40px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      max-width: 80%;
      height: 150px;
      background: #fdfdfd;
      z-index: 5;
      box-shadow: 
        inset -15px 0 30px rgba(0,0,0,0.05),
        inset 0 10px 20px rgba(255,255,255,1),
        0 -10px 40px rgba(0,0,0,0.1);
      border-radius: 4px;
      clip-path: polygon(10% 20%, 90% 0%, 100% 100%, 0% 100%);
    }

    /* 제품 래퍼 & 이미지 */
    .product-wrapper {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 280px;
      max-width: 70vw;
      height: 450px;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      filter: drop-shadow(0 20px 20px rgba(0,0,0,0.25));
    }

    .product-image {
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
      z-index: 10;
    }

    .placeholder-box {
      width: 100%;
      height: 400px;
      border: 3px dashed rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      backdrop-filter: blur(5px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #fff;
      cursor: pointer;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <div class="poster">
    
    <!-- 1. 헤더 텍스트 영역 -->
    <div class="header">
      <div class="line1">
        <span>웰라쥬 재구매율</span>
        <span class="box-blue">1위*</span>
      </div>
      
      <div class="line2">
        <span class="text-chunk">기존 앰플 대비</span>
        <span class="divider">|</span>
        <span class="box-blue">**100배</span>
        <span class="bold-text">대용량</span>
      </div>
    </div>
    
    <div class="footnotes">
      *22년 07월 누계 웰라쥬 자사몰 에센스 카테고리 기준<br>
      **자사 원데이키트 솔루션 제품 용량 대비
    </div>

    <!-- 2. 거대한 배경 글자 컨테이너화 -->
    <div class="giant-text-container">
      <div class="giant-text bg-am">앰</div>
      <div class="giant-text bg-ple">플</div>
      <div class="giant-text bg-1">1</div>
      <div class="giant-text bg-wi">위<span class="star">*</span></div>
    </div>

    <!-- 3. 흰색 단상 -->
    <div class="pedestal"></div>

    <!-- 4. 제품 얹는 곳 -->
    <div class="product-wrapper">
      <img src="" id="productImg" class="product-image" style="display:none;" />
      <div class="placeholder-box" id="placeholder" onclick="document.getElementById('fileInput').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="40" height="40" style="margin-bottom:15px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        <span style="font-weight:700;">투명 앰플 누끼 업로드</span>
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="loadFile(event)">
    </div>

  </div>

  <script>
    function loadFile(event) {
      if (event.target.files.length > 0) {
        var src = URL.createObjectURL(event.target.files[0]);
        var preview = document.getElementById('productImg');
        preview.src = src;
        preview.style.display = 'block';
        document.getElementById('placeholder').style.display = 'none';
      }
    }
  </script>

</body>
</html>
