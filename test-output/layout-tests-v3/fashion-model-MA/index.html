<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" />
<style>
@font-face {
  font-family: 'Callifont';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2510-1@1.0/Callifont-Medium.woff2') format('woff2');
  font-weight: 1 999;
  font-display: swap;
}
</style>
<style>
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(24px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>
<body style="margin:0;padding:0;">
<section class="hero-ma" style="
  position: relative;
  width: 100%;
  min-height: 100vh;
  overflow: hidden;
">
  <div class="model-placeholder" style="
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #333;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #666;
        font-size: 24px;
        z-index: 0;
      ">모델 이미지</div>
  <div class="gradient-overlay" style="
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(180deg, transparent 30%, rgba(0,0,0,0.88) 65%);
    z-index: 1;
    pointer-events: none;
  "></div>
  <div class="overlay-content" style="
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    padding: 0 24px 40px;
    z-index: 5;
    box-sizing: border-box;
  ">
    <p class="eyebrow" style="
        font-family: 'Pretendard', sans-serif;
        font-size: clamp(11px, 1.1vw, 16px);
        font-weight: 300;
        letter-spacing: 5px;
        text-transform: uppercase;
        color: #0A0A0A;
        margin: 0 0 clamp(12px, 1.5vw, 20px) 0;
        animation: fadeInUp 0.7s ease 0.1s both;
      ">테스트</p>
    <h1 class="headline" style="
    font-family: 'Callifont', sans-serif;
    font-size: 52px;
    font-weight: 900;
    letter-spacing: -3px;
    line-height: 1.1;
    word-break: keep-all;
    color: #fff;
    margin: 0 0 clamp(12px, 1.5vw, 20px) 0;
    animation: fadeInUp 0.7s ease 0.2s both;
  ">테스트 헤드라인
두 번째 줄</h1>
    <p class="subheadline" style="
        font-family: 'Black Han Sans', sans-serif;
        font-size: clamp(14px, 1.6vw, 22px);
        font-weight: 300;
        line-height: 1.6;
        color: rgba(255,255,255,0.65);
        margin: 0 0 clamp(16px, 2vw, 24px) 0;
        animation: fadeInUp 0.7s ease 0.3s both;
      ">서브헤드라인 텍스트</p>
    <div class="stats-row" style="
        display: flex;
        gap: clamp(24px, 3.5vw, 48px);
        margin: 0 0 clamp(16px, 2vw, 24px) 0;
        animation: fadeInUp 0.7s ease 0.5s both;
      "><div style="text-align:center;">
        <span style="
          display:block;
          font-family: 'Callifont', sans-serif;
          font-size: clamp(28px, 4vw, 48px);
          font-weight: 900;
          color: #fff;
          line-height: 1.1;
        ">100<span style="
          font-size: clamp(12px, 1.2vw, 16px);
          font-weight: 300;
          margin-left: 4px;
        ">%</span></span><span style="
          display:block;
          font-family: 'Pretendard', sans-serif;
          font-size: 11px;
          font-weight: 300;
          opacity: 0.6;
          color: #fff;
          margin-top: 4px;
        ">테스트</span>
      </div></div>
    
    <button class="cta-btn" style="
    width: 100%;
    padding: 22px 0;
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(16px, 1.7vw, 24px);
    font-weight: 700;
    color: #ffffff;
    background: #0A0A0A;
    border: none;
    border-radius: 10px;
    box-shadow: 0 0 30px #0A0A0A59;
    cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    animation: fadeInUp 0.7s ease 0.8s both;
  " onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform='translateY(0)'">구매하기</button>
    <p class="micro" style="
        font-family: 'Pretendard', sans-serif;
        font-size: clamp(11px, 0.9vw, 13px);
        font-weight: 300;
        opacity: 0.6;
        color: rgba(255,255,255,0.5);
        margin: 8px 0 0 0;
        text-align: center;
      ">무료배송 · 안심 환불</p>
  </div>
</section>
</body>
</html>
