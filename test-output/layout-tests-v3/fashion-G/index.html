<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Layout G - Minimal Luxury</title>
<style>
@font-face {
  font-family: 'SOGANGUNIVERSITY';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2312-1@1.1/SOGANGUNIVERSITYTTF.woff2') format('woff2');
  font-weight: 1 999;
  font-display: swap;
}

@font-face {
  font-family: 'A2G Light';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/%EC%97%90%EC%9D%B4%ED%88%AC%EC%A7%80%EC%B2%B4-3Light.woff2') format('woff2');
  font-weight: 1 999;
  font-display: swap;
}

@font-face {
  font-family: 'Daehan';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_twelve@1.1/Daehan-Regular.woff') format('woff');
  font-weight: 1 999;
  font-display: swap;
}
</style>
<style>
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(24px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>
<body style="margin:0;padding:0;overflow-x:hidden;">
<section style="
    position: relative;
    min-height: 100vh;
    background: linear-gradient(180deg, #ffffff 0%, #f5f5f5 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 120px clamp(24px, 5vw, 80px) clamp(64px, 8vw, 120px);
    text-align: center;
    font-family: 'Daehan', sans-serif;
    overflow: hidden;
  ">

    <!-- eyebrow -->
    <p class="eyebrow" style="
    font-size: clamp(11px, 1.1vw, 16px);
    font-weight: 300;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #6b6b6b;
    margin: 0 0 clamp(16px, 2vw, 24px) 0;
    animation: fadeInUp 0.7s ease 0.1s both;
  ">테스트</p>

    <!-- headline -->
    <h1 style="
      font-family: 'SOGANGUNIVERSITY', serif;
      font-size: clamp(48px, 5.5vw, 72px);
      font-weight: 900;
      letter-spacing: -4px;
      line-height: 1.08;
      color: #1a1a1a;
      margin: 0 0 clamp(48px, 6vw, 80px) 0;
      word-break: keep-all;
      animation: fadeInUp 0.7s ease 0.2s both;
    ">테스트 헤드라인
두 번째 줄</h1>

    <!-- product zone (40%, NO rotate, NO shadow) — forced small -->
    <div class="product-zone" style="
      width: 40%;
      max-width: 260px;
      margin: 0 auto clamp(48px, 6vw, 80px);
      animation: fadeInUp 0.8s ease 0.4s both;
    "><img src="undefined" alt="product" style="
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 20px 40px rgba(0,0,0,0.15));
    " /></div>

    <!-- ghost CTA (border-only, transparent bg) -->
    <button style="
      width: 100%;
      max-width: 400px;
      padding: 22px 0;
      font-family: 'A2G Light', sans-serif;
      font-size: clamp(16px, 1.7vw, 24px);
      font-weight: 700;
      color: #2D2D2D;
      background: transparent;
      border: 1px solid #0A0A0A1F;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.25s ease, background 0.25s ease;
      animation: fadeInUp 0.7s ease 0.6s both;
    " onmouseover="this.style.transform='translateY(-3px)';this.style.background='#0A0A0A0A'"
      onmouseout="this.style.transform='translateY(0)';this.style.background='transparent'"
    >구매하기</button>

    <!-- micro -->
    <p class="micro" style="
    font-size: clamp(11px, 0.9vw, 13px);
    font-weight: 300;
    opacity: 0.6;
    color: #6b6b6b;
    margin: 8px 0 0 0;
    text-align: center;
  ">무료배송 · 안심 환불</p>

  </section>
</body>
</html>
