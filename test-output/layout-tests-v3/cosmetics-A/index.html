<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>롬앤 틴트</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/moonspam/NanumSquareNeo@1.0/nanumsquareneo.css" />
<style>
@font-face {
  font-family: 'KartriderExtraBold';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2312-1@1.1/KartriderExtraBold.woff2') format('woff2');
  font-weight: 1 999;
  font-display: swap;
}
</style>
  <style>
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(24px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      word-break: keep-all;
    }
    .hero {
      position: relative;
      overflow: hidden;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #E91E8C;
      color: #ffffff;
    }
    .hero .headline {
      font-family: 'KartriderExtraBold', sans-serif;
    }
    .hero .eyebrow,
    .hero .desc,
    .hero .micro,
    .hero .stat-label,
    .hero .trust-badge {
      font-family: 'NanumSquareNeo', sans-serif;
    }
    .hero .stat-number,
    .hero .sale-price,
    .hero .discount-badge,
    .hero .big-badge,
    .hero .big-stat {
      font-family: 'KartriderExtraBold', sans-serif;
    }
    .hero .cta-btn {
      font-family: 'NanumSquareNeo', sans-serif;
    }
  </style>
</head>
<body>
  <section class="hero mood-vivid">
    <div class="noise-overlay" style="
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.035;
    mix-blend-mode: overlay;
  "><svg width="100%" height="100%"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(#noise)"/></svg></div>
    <div class="bg-ghost" style="
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(200px, 35vw, 500px);
    font-weight: 900;
    opacity: 0.03;
    pointer-events: none;
    z-index: 0;
    line-height: 1;
    user-select: none;
  ">롬</div>
    <div class="hero-inner" style="
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: clamp(40px, 6vw, 80px) clamp(16px, 4vw, 40px);
    ">
      
      <div style="text-align: center;">
        <p class="eyebrow" style="
    font-size: clamp(11px, 1.1vw, 16px);
    font-weight: 300;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.75);
    margin: 0 0 clamp(16px, 2vw, 24px) 0;
    animation: fadeInUp 0.7s ease 0.1s both;
  ">테스트</p>
        <h1 class="headline" style="
    font-size: clamp(42px, 7.2vw, 100px);
    font-weight: 900;
    letter-spacing: -4px;
    line-height: 1.08;
    word-break: keep-all;
    color: #ffffff;
    margin: 0 0 clamp(16px, 2vw, 32px) 0;
    animation: fadeInUp 0.7s ease 0.2s both;
  ">테스트 헤드라인 두 번째 <span class="accent" style="color:#E91E8C;text-shadow:0 0 30px #E91E8C40;">줄</span></h1>
        <div style="display: flex; justify-content: center;">
          <p class="desc" style="
    font-size: clamp(14px, 1.6vw, 22px);
    font-weight: 300;
    line-height: 1.75;
    max-width: 640px;
    color: rgba(255,255,255,0.75);
    margin: 0 0 clamp(24px, 3vw, 40px) 0;
    animation: fadeInUp 0.7s ease 0.4s both;
  ">설명 텍스트 · 4.8점</p>
        </div>
        <div class="product-zone" style="
      position: relative;
      width: 55%;
      max-width: 340px;
      margin: 0 auto;
      transform: rotate(-2deg);
      animation: fadeInUp 0.8s ease 0.5s both;
    "><img src="product.png" alt="product" style="
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5)) drop-shadow(0 0 60px rgba(200,100,40,0.2));
    " /></div>
        <div style="margin: clamp(24px, 3vw, 40px) 0;">
          <div class="stats-row" style="
    display: flex;
    justify-content: center;
    gap: clamp(24px, 3.5vw, 48px);
    animation: fadeInUp 0.7s ease 0.7s both;
  "><div class="stat-item" style="text-align:center;">
      <span class="stat-number" style="
        display: block;
        font-size: clamp(32px, 4.8vw, 72px);
        font-weight: 900;
        color: #E91E8C;
        line-height: 1.1;
      ">100<span class="stat-unit" style="
        font-size: clamp(14px, 1.4vw, 20px);
        font-weight: 300;
        margin-left: 4px;
      ">%</span></span><span class="stat-label" style="
          display: block;
          font-size: clamp(11px, 1vw, 14px);
          font-weight: 300;
          opacity: 0.6;
          margin-top: 4px;
        ">테스트</span>
    </div></div>
        </div>
        
        <div style="max-width: 480px; margin: clamp(24px, 3vw, 40px) auto 0;">
          <button class="cta-btn" style="
    width: 100%;
    padding: 22px 0;
    font-size: clamp(16px, 1.7vw, 24px);
    font-weight: 700;
    color: #E91E8C;
    background: #ffffff;
    border: none;
    border-radius: 10px;
    box-shadow: 0 0 30px #ffffff59;
    cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    animation: fadeInUp 0.7s ease 1.0s both;
  " onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform='translateY(0)'">구매하기</button>
          <p class="micro" style="
    font-size: clamp(11px, 0.9vw, 13px);
    font-weight: 300;
    opacity: 0.6;
    color: rgba(255,255,255,0.75);
    margin: 8px 0 0 0;
    text-align: center;
  ">무료배송 · 안심 환불</p>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
