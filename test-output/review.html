<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>후기가 증명하는 효과</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #e8e8e8;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .card {
    width: 480px;
    height: 480px;
    background: #3aa8d0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .line {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 120px;
    color: #f0f0e0;
    line-height: 1.15;
    font-style: italic;
    transform: skewX(-5deg);
    text-shadow: 1px 1px 0 #1a6a8a, 2px 2px 0 #1a6a8a, 3px 3px 0 #1a6a8a, 4px 4px 0 #1a6a8a, 5px 5px 0 #1a6a8a, 6px 6px 0 #1a6a8a, 7px 7px 0 #1a6a8a, 8px 8px 0 #1a6a8a, 9px 9px 0 #1a6a8a, 10px 10px 0 #1a6a8a, 11px 11px 0 #1a6a8a, 12px 12px 0 #1a6a8a, 13px 13px 0 #1a6a8a, 14px 14px 0 #1a6a8a, 15px 15px 0 #1a6a8a, 16px 16px 0 #1a6a8a, 17px 17px 0 #1a6a8a, 18px 18px 0 #1a6a8a, 19px 19px 0 #1a6a8a, 20px 20px 0 #1a6a8a, 21px 21px 0 #1a6a8a, 22px 22px 0 #1a6a8a, 23px 23px 0 #1a6a8a, 24px 24px 0 #1a6a8a, 25px 25px 0 #1a6a8a, 26px 26px 0 #1a6a8a, 27px 27px 0 #1a6a8a, 28px 28px 0 #1a6a8a, 29px 29px 0 #1a6a8a, 30px 30px 0 #1a6a8a, 31px 31px 0 #1a6a8a, 32px 32px 0 #1a6a8a, 33px 33px 0 #1a6a8a, 34px 34px 0 #1a6a8a, 35px 35px 0 #1a6a8a, 36px 36px 0 #1a6a8a, 37px 37px 0 #1a6a8a, 38px 38px 0 #1a6a8a, 39px 39px 0 #1a6a8a, 40px 40px 0 #1a6a8a;
  }

  .line.yellow {
    font-size: 120px;
    color: #e8e060;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="line">후기가</div>
    <div class="line">증명하는</div>
    <div class="line yellow">효과</div>
  </div>
</body>
</html>
