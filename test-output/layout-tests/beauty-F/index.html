<!-- LAYOUT: F | MOOD: mood-dark | FONT: SET-2 | COLOR: #C9A96E -->
<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>설화수 자음생크림</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:#0a0a0a;display:flex;justify-content:center}
@keyframes fadeInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.hero{width:100%;margin:0 auto;min-height:100vh;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;padding:clamp(32px,4vw,64px) 0 40px;background:radial-gradient(ellipse at 50% 30%, #C9A96E30 0%, transparent 60%), linear-gradient(180deg, #1a1410, #120e08 40%, #0d0a07);color:#fff}
.eyebrow{font-size:clamp(11px,1.1vw,16px);font-weight:300;letter-spacing:5px;color:#C9A96E80;animation:fadeInUp .7s ease .1s both}
.headline{font-size:clamp(42px,7.2vw,100px);font-weight:900;letter-spacing:-4px;line-height:1.08;text-align:center;padding:20px 16px 0;word-break:keep-all;animation:fadeInUp .7s ease .2s both}
.accent{color:#C9A96E}
.desc{font-size:clamp(14px,1.6vw,22px);font-weight:300;color:rgba(255,255,255,0.4);line-height:1.75;text-align:center;margin-top:clamp(12px,1.5vw,24px);padding:0 clamp(20px,3vw,48px);max-width:640px;animation:fadeInUp .7s ease .4s both}
.product-zone{position:relative;margin-top:clamp(16px,2vw,32px);width:55%;max-width:340px;z-index:3;transform:rotate(-2deg);animation:fadeInUp .8s ease .5s both}
.product-zone img{width:100%;height:auto;filter:drop-shadow(0 20px 40px rgba(0,0,0,0.5))}
.stats{display:flex;justify-content:center;gap:clamp(24px,3.5vw,48px);margin-top:clamp(24px,3vw,48px);padding:0 clamp(20px,3vw,48px);animation:fadeInUp .7s ease .7s both}
.trust{text-align:center;margin-top:clamp(20px,2.5vw,40px);animation:fadeInUp .7s ease .9s both}
.trust-card{display:inline-block;border:1px solid #C9A96E20;border-radius:16px;background:#C9A96E08;padding:14px 32px}
.trust-rank{font-size:clamp(24px,3vw,42px);font-weight:900;color:#C9A96E}
.trust-platform{font-size:clamp(11px,0.9vw,13px);color:rgba(255,255,255,0.45);margin-top:4px}

.cta-area{width:100%;padding:0 clamp(20px,3vw,48px);margin-top:clamp(20px,2.5vw,40px);animation:fadeInUp .7s ease 1s both}
.cta-btn{display:block;width:100%;padding:22px 0;font-size:clamp(16px,1.7vw,24px);font-weight:700;border-radius:16px;text-align:center;text-decoration:none;border:none;cursor:pointer;background:linear-gradient(135deg,#C9A96E,#C9A96Edd);color:#0d0a07;box-shadow:0 8px 36px #C9A96E59;transition:all .3s}
.cta-btn:hover{transform:translateY(-3px)}
.micro{font-size:clamp(11px,0.9vw,13px);font-weight:300;color:rgba(255,255,255,0.15);margin-top:12px;text-align:center}
</style></head><body>
<section class="hero mood-dark">
<p class="eyebrow">뷰티 · 스킨케어</p>

<h1 class="headline">설화수 자음생크림의 새로운 <span class="accent">시작</span></h1>
<div class="desc">48시간 보습 · 4.9점</div>
<div class="product-zone"><img src="product.png" alt="설화수 자음생크림"></div>

<div class="stats"><div style="text-align:center"><div style="font-size:clamp(32px,4.8vw,72px);font-weight:900;color:#C9A96E;letter-spacing:-2px">48</div><div style="font-size:clamp(14px,1.4vw,20px);font-weight:300;color:#C9A96E66">시간 보습</div></div><div style="text-align:center"><div style="font-size:clamp(32px,4.8vw,72px);font-weight:900;color:#C9A96E;letter-spacing:-2px">4.9</div><div style="font-size:clamp(14px,1.4vw,20px);font-weight:300;color:#C9A96E66">점</div></div><div style="text-align:center"><div style="font-size:clamp(32px,4.8vw,72px);font-weight:900;color:#C9A96E;letter-spacing:-2px">5,200</div><div style="font-size:clamp(14px,1.4vw,20px);font-weight:300;color:#C9A96E66">건</div></div></div>
<div class="trust"><div class="trust-card"><div class="trust-rank">🏆 올리브영 1위</div><div class="trust-platform">글로우픽 어워드</div></div></div>
<div class="cta-area"><a href="#" class="cta-btn">지금 만나보기</a><p class="micro">전 상품 무료배송 · 100% 안심 환불 보장</p></div>
</section></body></html>
