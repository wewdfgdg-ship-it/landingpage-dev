<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layout D - Trust Story</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" />
<style>
@font-face {
  font-family: 'NEXON Lv1 Gothic OTF Bold';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-04@2.1/NEXON Lv1 Gothic OTF Bold.woff') format('woff');
  font-weight: 700;
  font-display: swap;
}
</style>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Pretendard', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    h1 { font-family: 'NEXON Lv1 Gothic OTF Bold', sans-serif; }
    .micro, .eyebrow, .stat-label, .trust-item-label { font-family: 'Noto Serif KR', serif; }
  </style>
</head>
<body>

<style>
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(24px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
<section class="hero layout-d" style="
  position: relative;
  width: 100%;
  min-height: 100vh;
  background: radial-gradient(ellipse at 50% 80%, rgba(46,125,50,0.18) 0%, transparent 60%), linear-gradient(180deg, #1a1410 0%, #120f0a 40%, #0d0a07 100%);
  color: #ffffff;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
">
  <div class="noise-overlay" style="
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.035;
    mix-blend-mode: overlay;
  "><svg width="100%" height="100%"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(#noise)"/></svg></div>
  <div class="bg-ghost" style="
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(200px, 35vw, 500px);
    font-weight: 900;
    opacity: 0.03;
    pointer-events: none;
    z-index: 0;
    line-height: 1;
    user-select: none;
  ">undefined</div>

  <div class="trust-full" style="
        width: 100%;
        background: #2E7D320D;
        border-bottom: 1px solid #2E7D321A;
        text-align: center;
        padding: clamp(12px, 1.5vw, 20px) 16px;
        animation: fadeInUp 0.5s ease 0s both;
      ">
        <span style="
          font-size: clamp(13px, 1.2vw, 18px);
          font-weight: 700;
          color: #2E7D32;
          letter-spacing: 1px;
        ">식약처 인증</span>
      </div>

  <div class="content-wrap" style="
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    padding: clamp(32px, 4vw, 64px) clamp(16px, 3vw, 32px);
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(16px, 2vw, 24px);
  ">
    <p class="eyebrow" style="
    font-size: clamp(11px, 1.1vw, 16px);
    font-weight: 300;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin: 0 0 clamp(16px, 2vw, 24px) 0;
    animation: fadeInUp 0.7s ease 0.1s both;
  ">건강기능식품</p>
    <h1 class="headline" style="
    font-size: clamp(42px, 7.2vw, 100px);
    font-weight: 900;
    letter-spacing: -4px;
    line-height: 1.08;
    word-break: keep-all;
    color: #ffffff;
    margin: 0 0 clamp(16px, 2vw, 32px) 0;
    animation: fadeInUp 0.7s ease 0.2s both;
  ">장이 편해야 하루가 <span class="accent" style="color:#2E7D32;text-shadow:0 0 30px #2E7D3240;">편하다</span></h1>
    <div class="product-zone" style="
      position: relative;
      width: 55%;
      max-width: 340px;
      margin: 0 auto;
      transform: rotate(-2deg);
      animation: fadeInUp 0.8s ease 0.5s both;
    "><img src="product.png" alt="product" style="
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5)) drop-shadow(0 0 60px rgba(200,100,40,0.2));
    " /></div>
    
    <div class="stats-row" style="
    display: flex;
    justify-content: center;
    gap: clamp(24px, 3.5vw, 48px);
    animation: fadeInUp 0.7s ease 0.7s both;
  "><div class="stat-item" style="text-align:center;">
      <span class="stat-number" style="
        display: block;
        font-size: clamp(32px, 4.8vw, 72px);
        font-weight: 900;
        color: #2E7D32;
        line-height: 1.1;
      ">100억<span class="stat-unit" style="
        font-size: clamp(14px, 1.4vw, 20px);
        font-weight: 300;
        margin-left: 4px;
      "></span></span><span class="stat-label" style="
          display: block;
          font-size: clamp(11px, 1vw, 14px);
          font-weight: 300;
          opacity: 0.6;
          margin-top: 4px;
        ">보장 유산균</span>
    </div><div class="stat-item" style="text-align:center;">
      <span class="stat-number" style="
        display: block;
        font-size: clamp(32px, 4.8vw, 72px);
        font-weight: 900;
        color: #2E7D32;
        line-height: 1.1;
      ">4.8<span class="stat-unit" style="
        font-size: clamp(14px, 1.4vw, 20px);
        font-weight: 300;
        margin-left: 4px;
      ">점</span></span><span class="stat-label" style="
          display: block;
          font-size: clamp(11px, 1vw, 14px);
          font-weight: 300;
          opacity: 0.6;
          margin-top: 4px;
        ">평균 평점</span>
    </div><div class="stat-item" style="text-align:center;">
      <span class="stat-number" style="
        display: block;
        font-size: clamp(32px, 4.8vw, 72px);
        font-weight: 900;
        color: #2E7D32;
        line-height: 1.1;
      ">3,200<span class="stat-unit" style="
        font-size: clamp(14px, 1.4vw, 20px);
        font-weight: 300;
        margin-left: 4px;
      ">건</span></span><span class="stat-label" style="
          display: block;
          font-size: clamp(11px, 1vw, 14px);
          font-weight: 300;
          opacity: 0.6;
          margin-top: 4px;
        ">누적 리뷰</span>
    </div></div>
    <p class="desc" style="
    font-size: clamp(14px, 1.6vw, 22px);
    font-weight: 300;
    line-height: 1.75;
    max-width: 640px;
    color: rgba(255,255,255,0.45);
    margin: 0 0 clamp(24px, 3vw, 40px) 0;
    animation: fadeInUp 0.7s ease 0.4s both;
  ">100억 유산균 · 4.8점 평점</p>
    <button class="cta-btn" style="
    width: 100%;
    padding: 22px 0;
    font-size: clamp(16px, 1.7vw, 24px);
    font-weight: 700;
    color: #0d0a07;
    background: linear-gradient(135deg, #6da470, #2E7D32);
    border: none;
    border-radius: 10px;
    box-shadow: 0 0 30px linear-gradient(135deg, #6da470, #2E7D32)59;
    cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    animation: fadeInUp 0.7s ease 1.0s both;
  " onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform='translateY(0)'">건강 시작하기</button>
    <p class="micro" style="
    font-size: clamp(11px, 0.9vw, 13px);
    font-weight: 300;
    opacity: 0.6;
    color: rgba(255,255,255,0.45);
    margin: 8px 0 0 0;
    text-align: center;
  ">정기배송 10% 할인 · 30일 환불 보장</p>
  </div>
</section>
</body>
</html>
