<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>면역력 환불보장</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #e8e8e8;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .card {
    width: 480px;
    height: 520px;
    background: #f5f0eb;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
  }

  .line1 {
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 400;
    font-size: 20px;
    color: #b0b0b0;
    margin-bottom: 8px;
  }

  .line2 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 85px;
    color: #1a1a3e;
    line-height: 1.05;
  }

  .line3-wrap {
    position: relative;
    width: 100%;
    display: flex;
    justify-content: center;
    margin-top: -5px;
  }

  .line3 {
    display: inline-block;
    background: #cc1111;
    color: #ffffff;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 28px;
    padding: 4px 14px;
    transform: rotate(-8deg);
    position: absolute;
    left: 50px;
    top: 10px;
    z-index: 2;
  }

  .line4 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 130px;
    color: #cc1111;
    line-height: 1.0;
    margin-top: 5px;
  }

  .line5 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 80px;
    color: #1a1a3e;
    line-height: 1.1;
  }

  .line6 {
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 400;
    font-size: 16px;
    color: #888888;
    margin-top: 8px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="line1">지금 당장 필요한 건!</div>
    <div class="line2">면역력</div>
    <div class="line3-wrap">
      <span class="line3">전 고객</span>
    </div>
    <div class="line4">전액</div>
    <div class="line5">환불 보장</div>
    <div class="line6">[ 전국민 면역력 프로젝트 ]</div>
  </div>
</body>
</html>
