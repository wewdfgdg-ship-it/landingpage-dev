<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAQ saas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,900;1,600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #e8e8e8;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .card {
    width: 390px;
    height: 520px;
    background: #b5e4d7;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .faq {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 120px;
    color: #333;
    line-height: 1.15;
  }

  .saas {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-style: italic;
    font-size: 95px;
    color: #444;
    line-height: 1.15;
    margin-top: 4px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="faq">FAQ</div>
    <div class="saas">saas</div>
  </div>
</body>
</html>
