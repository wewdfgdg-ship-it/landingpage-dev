<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>환불보장</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #e8e8e8;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .card {
    width: 580px;
    height: 435px;
    background: #fff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .percent {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 130px;
    color: #e41e1e;
    line-height: 1.0;
  }

  .refund {
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 900;
    font-size: 105px;
    color: #1a1a1a;
    line-height: 1.1;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="percent">100%</div>
    <div class="refund">환불보장</div>
  </div>
</body>
</html>
