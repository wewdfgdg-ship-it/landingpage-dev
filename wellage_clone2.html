<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>웰라쥬 앰플 클론</title>
  <style>
    /* Reset & Base */
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: #eef2f5;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* 포스터 컨테이너 */
    .poster {
      position: relative;
      width: 600px;
      height: 900px;
      margin: 0 auto;
      overflow: hidden;
      background: linear-gradient(180deg, #1b68ea 0%, #308cf2 30%, #5fbafb 70%, #87cfff 100%);
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    }

    /* 상단 텍스트 영역 */
    .header {
      position: absolute;
      top: 40px;
      left: 0;
      width: 100%;
      padding: 0 40px;
      z-index: 10;
    }

    /* 첫 번째 줄: 웰라쥬 재구매율 1위* */
    .line1 {
      display: flex;
      align-items: center;
      font-size: 54px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: -3px;
      margin-bottom: 6px;
    }
    
    .line1 .box-blue {
      background-color: #0d3bca; /* 진한 파랑 */
      padding: 2px 16px;
      margin-left: 12px;
      line-height: 1.1;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
    }

    /* 두 번째 줄: 기존 앰플 대비 | **100배 대용량 */
    .line2 {
      display: flex;
      align-items: center;
      font-size: 42px;
      font-weight: 300;
      color: #e0f0ff;
      letter-spacing: -2px;
    }

    .line2 .divider {
      color: rgba(255,255,255,0.4);
      margin: 0 12px;
      font-weight: 100;
    }

    .line2 .box-blue {
      background-color: #0d3bca;
      font-weight: 900;
      color: #ffffff;
      padding: 2px 14px;
      line-height: 1.1;
      margin-right: 12px;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
      letter-spacing: -1px;
    }

    .line2 .bold-text {
      color: #ffffff;
      font-weight: 600;
    }

    /* 각주 텍스트 */
    .footnotes {
      position: absolute;
      top: 170px;
      right: 40px;
      text-align: right;
      font-size: 11px;
      color: #ffffff;
      font-weight: 400;
      line-height: 1.4;
      letter-spacing: -0.5px;
      opacity: 0.9;
    }

    /* 거대 배경 텍스트 - 글자별로 절대 위치 고정 */
    .giant-text {
      position: absolute;
      font-weight: 900;
      color: #ffffff;
      line-height: 1;
      text-shadow: 0 10px 30px rgba(27, 104, 234, 0.4);
      z-index: 2;
    }

    .bg-am {
      top: 240px;
      left: 60px;
      font-size: 170px;
    }

    .bg-ple {
      top: 240px;
      right: 60px;
      font-size: 170px;
    }

    .bg-1 {
      top: 480px;
      left: 70px;
      font-size: 280px;
      letter-spacing: -10px;
      transform: scaleY(1.1); /* 약간 위아래로 길게 */
    }

    .bg-wi {
      top: 550px;
      right: 60px;
      font-size: 200px;
    }

    .bg-wi .star {
      position: absolute;
      top: -20px;
      right: -40px;
      font-size: 90px;
    }

    /* 바닥의 하얀 단상 */
    .pedestal {
      position: absolute;
      bottom: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 380px;
      height: 200px;
      background: #fdfdfd;
      z-index: 5;
      /* 3D 사각형 느낌 */
      box-shadow: 
        inset -15px 0 30px rgba(0,0,0,0.05),
        inset 0 10px 20px rgba(255,255,255,1),
        0 -10px 40px rgba(0,0,0,0.1);
      border-radius: 4px;
      /* 살짝 비스듬한 3D 원근감 */
      clip-path: polygon(10% 20%, 90% 0%, 100% 100%, 0% 100%);
    }

    /* 제품 이미지 자리 */
    .product-wrapper {
      position: absolute;
      bottom: 90px; /* 단상 위 */
      left: 50%;
      transform: translateX(-50%);
      width: 320px;
      height: 500px;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      filter: drop-shadow(0 20px 20px rgba(0,0,0,0.25));
    }

    .product-image {
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
      z-index: 10;
    }

    /* 이미지 업로드 가이드 (점선 박스) */
    .placeholder-box {
      width: 100%;
      height: 480px;
      border: 3px dashed rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      backdrop-filter: blur(5px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #fff;
      cursor: pointer;
      transition: 0.2s;
    }

    .placeholder-box:hover {
      background: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>

  <div class="poster">
    
    <!-- 1. 헤더 텍스트 영역 -->
    <div class="header">
      <div class="line1">
        <span>웰라쥬 재구매율</span>
        <span class="box-blue">1위*</span>
      </div>
      <div class="line2">
        <span>기존 앰플 대비</span>
        <span class="divider">|</span>
        <span class="box-blue">**100배</span>
        <span class="bold-text">대용량</span>
      </div>
    </div>
    
    <!-- 각주 -->
    <div class="footnotes">
      *22년 07월 누계 웰라쥬 자사몰 에센스 카테고리 기준<br>
      **자사 원데이키트 솔루션 제품 용량 대비
    </div>

    <!-- 2. 거대한 배경 글자 -->
    <div class="giant-text bg-am">앰</div>
    <div class="giant-text bg-ple">플</div>
    <div class="giant-text bg-1">1</div>
    <div class="giant-text bg-wi">위<span class="star">*</span></div>

    <!-- 3. 흰색 단상 (botoom) -->
    <div class="pedestal"></div>

    <!-- 4. 제품 얹는 곳 -->
    <div class="product-wrapper">
      <img src="" id="productImg" class="product-image" style="display:none;" />
      
      <div class="placeholder-box" id="placeholder" onclick="document.getElementById('fileInput').click()">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom:10px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        <span style="font-weight:700; font-size:18px;">투명 앰플 누끼 업로드</span>
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="loadFile(event)">
    </div>

  </div>

  <script>
    function loadFile(event) {
      if (event.target.files.length > 0) {
        var src = URL.createObjectURL(event.target.files[0]);
        var preview = document.getElementById('productImg');
        preview.src = src;
        preview.style.display = 'block';
        document.getElementById('placeholder').style.display = 'none';
      }
    }
  </script>

</body>
</html>
