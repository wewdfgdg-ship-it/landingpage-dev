<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UGREEN DigiNest Pro 클론</title>
<!-- 굵고 강력한 프리텐다드 폰트 적용 -->
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    padding: 0;
    /* 일출 하늘과 우주 배경 느낌의 그라데이션 - 원본과 1:1 매칭 */
    background: linear-gradient(180deg, 
      #0e1945 0%, 
      #1b327b 40%, 
      #33428f 65%, 
      #9c5c6e 85%, 
      #eca06c 96%, 
      #000000 97%, 
      #000000 100%);
    font-family: 'Pretendard', sans-serif;
    color: white;
    overflow-x: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* 1. 상단 타이포그래피 */
  .text-section {
    text-align: center;
    margin-top: 10vh;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .title-1 {
    font-size: 5.2rem;
    font-weight: 800;
    color: #a0c9fa; /* 밝은 스카이블루 */
    letter-spacing: -2.5px;
    margin: 0 0 20px 0;
    text-shadow: 0 4px 15px rgba(0,0,0,0.4);
    line-height: 1.1;
  }

  .badge-wrapper {
    margin-bottom: 25px;
  }

  .badge {
    display: inline-block;
    border: 2px solid #ffffff; /* 얇은 화이트 톤 테두리 */
    border-radius: 50px;
    padding: 8px 32px;
    font-size: 1.8rem;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -0.5px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  .title-2 {
    font-size: 4.8rem;
    font-weight: 900;
    margin: 0 0 5px 0;
    letter-spacing: -1.5px;
    text-shadow: 0 4px 15px rgba(0,0,0,0.5);
    line-height: 1.1;
  }

  .title-3 {
    font-size: 4.8rem;
    font-weight: 900;
    margin: 0;
    letter-spacing: -1.5px;
    text-shadow: 0 4px 15px rgba(0,0,0,0.5);
    line-height: 1.1;
  }

  /* 초록색 네온 포인트 색상 (원본과 동일) */
  .hl-green {
    color: #3efb67;
    text-shadow: 0 0 10px rgba(62, 251, 103, 0.3);
  }

  /* 2. 하단 빛나는 스탠드 단상 (CSS 3D 완벽 구현) */
  .pedestal-container {
    position: absolute;
    bottom: -15vh; /* 화면 밑바닥 지평선에 걸치게 설정 */
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 5;
  }

  /* 겉면 검은 베이스 */
  .pedestal-outer {
    width: 60vw;
    max-width: 900px;
    height: 300px;
    border-radius: 50%;
    background: linear-gradient(180deg, #162442 0%, #000 100%);
    box-shadow: 
      0 -5px 15px rgba(0,0,0,1),
      0 30px 50px rgba(0,0,0,1);
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    border: 1px solid #222; 
  }

  /* 중간 네온 블루빛 발광 링 */
  .pedestal-inner {
    width: 80%;
    height: 70%;
    border-radius: 50%;
    background: linear-gradient(180deg, #2f56b9 0%, #060e29 100%);
    box-shadow: 
      inset 0 10px 40px rgba(255,255,255,0.7), /* 반짝이는 위쪽 테두리 하이라이트 */
      inset 0 -10px 40px #000,
      0 0 60px rgba(55, 102, 214, 0.8); /* 전체를 밝히는 파란 네온 글로우 */
    border: 3px solid #5d8fff;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* 정중앙 어두운 심연 코어 */
  .pedestal-core {
    width: 75%;
    height: 70%;
    border-radius: 50%;
    background: #030614;
    box-shadow: 
      inset 0 20px 50px #000,
      0 0 30px rgba(55, 102, 214, 0.6);
  }

  /* 3. 진짜 제품 이미지 (누끼 / PNG / 투명 배경) 영역 */
  .product-image {
    position: absolute;
    bottom: 12vh; /* 제품 위치 정렬 */
    left: 50%;
    transform: translateX(-50%);
    width: 500px; /* 제품 크기 맞춤 */
    max-width: 80%;
    height: auto;
    z-index: 20;
    /* CSS로 공중에 떠있는 듯한 그림자 부여 */
    filter: drop-shadow(0 40px 40px rgba(0,0,0,0.6));
    animation: float 4s ease-in-out infinite;
  }

  /* 챗GPT 방식(CSS 박스 드로잉)의 한계를 넘기 위한 '이미지 업로드 가이드 상자' */
  .placeholder-box {
    position: absolute;
    bottom: 20vh;
    left: 50%;
    transform: translateX(-50%);
    width: 450px;
    height: 250px;
    background: rgba(255,255,255,0.08); /* 유리 같은 질감 */
    border: 2px dashed rgba(255,255,255,0.4);
    border-radius: 12px;
    backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 15;
    text-align: center;
    color: #eee;
    animation: float 4s ease-in-out infinite;
    cursor: pointer;
    transition: background 0.3s;
  }
  
  .placeholder-box:hover {
    background: rgba(255,255,255,0.15);
  }

  .placeholder-box svg {
    margin-bottom: 15px;
    opacity: 0.8;
  }

  .placeholder-box h3 {
    margin: 0 0 10px 0;
    color: #fff;
    font-size: 1.4rem;
  }

  .placeholder-box p {
    font-size: 1rem;
    line-height: 1.4;
    color: #ccc;
    margin: 0;
  }

  /* 둥둥 떠다니는 모션 */
  @keyframes float {
    0% { transform: translate(-50%, 0px); }
    50% { transform: translate(-50%, -15px); }
    100% { transform: translate(-50%, 0px); }
  }

  /* 브라우저/모바일 크기일 때 반응형 조절 */
  @media (max-width: 768px) {
    .title-1 { font-size: 3.5rem; }
    .title-2, .title-3 { font-size: 3.2rem; }
    .badge { font-size: 1.4rem; padding: 6px 20px;}
    .product-image { width: 80%; }
    .placeholder-box { width: 85%; }
    .pedestal-outer { width: 90vw; height: 180px; }
  }
</style>
</head>
<body>

  <!-- 1. 퍼펙트 폰트 렌더링 영역 (이미지 추출 후 CSS로 재구현) -->
  <div class="text-section">
    <h1 class="title-1">GaN III 멀티탭 충전기</h1>
    
    <div class="badge-wrapper">
      <div class="badge">Desktop Power Strip</div>
    </div>
    
    <h2 class="title-2">DigiNest Pro</h2>
    <h2 class="title-3">3680W with <span class="hl-green">PD 100W</span></h2>
  </div>

  <!-- 2. 핵심 디자인 기법: 가짜 CSS가 아닌 투명 이미지(PNG)를 넣는 공간 -->
  <img 
    src="" 
    alt="UGREEN 투명 이미지" 
    class="product-image" 
    id="myProduct"
    style="display: none;"
  />
  
  <div class="placeholder-box" id="placeholder" onclick="document.getElementById('fileInput').click()">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
    <h3>클릭하여 UGREEN 제품 "배경없는 이미지(PNG)" 등록</h3>
    <p>CSS로 어설프게 기기를 그리면 장난감처럼 보입니다.<br>진짜 전문가들은 고화질 투명 이미지를 화면에 얹습니다.</p>
  </div>
  
  <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="loadFile(event)">

  <!-- 3. 원본과 동일하게 빛나는 홀로그램 원형 베이스 (CSS 100%) -->
  <div class="pedestal-container">
    <div class="pedestal-outer">
      <div class="pedestal-inner">
        <div class="pedestal-core"></div>
      </div>
    </div>
  </div>

  <script>
    // 컴퓨터에 있는 투명 이미지를 넣는 즉시 미리보여주는 스크립트
    function loadFile(event) {
      if (event.target.files.length > 0) {
        var src = URL.createObjectURL(event.target.files[0]);
        var preview = document.getElementById('myProduct');
        preview.src = src;
        preview.style.display = 'block';
        document.getElementById('placeholder').style.display = 'none';
      }
    }
  </script>

</body>
</html>
