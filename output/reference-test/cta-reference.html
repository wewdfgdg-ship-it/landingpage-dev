<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>15 CTA</title>
  <style>

@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');

:root {
  /* ── Font ── */
  --s-font: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  --s-text-xs:   11px;
  --s-text-sm:   13px;
  --s-text-base: 15px;
  --s-text-lg:   18px;
  --s-text-xl:   24px;
  --s-text-2xl:  34px;
  --s-text-3xl:  42px;
  --s-text-4xl:  56px;
  --s-weight-light:   300;
  --s-weight-regular: 400;
  --s-weight-bold:    700;
  --s-weight-black:   900;
  --s-leading-tight:   1.14;
  --s-leading-snug:    1.3;
  --s-leading-normal:  1.5;
  --s-leading-relaxed: 1.7;
  --s-tracking-tight:  -0.04em;
  --s-tracking-normal: 0;
  --s-tracking-wide:   0.14em;

  /* ── Space (8px grid) ── */
  --s-space-1:  8px;
  --s-space-2:  16px;
  --s-space-3:  24px;
  --s-space-4:  32px;
  --s-space-5:  40px;
  --s-space-6:  48px;
  --s-space-8:  64px;

  /* ── Section ── */
  --s-section-max:   520px;
  --s-section-pad-x: 20px;
  --s-section-pad-y: 40px;

  /* ── Radius ── */
  --s-radius-sm:   8px;
  --s-radius-md:   14px;
  --s-radius-lg:   20px;
  --s-radius-xl:   24px;
  --s-radius-full: 999px;

  /* ── Shadow ── */
  --s-shadow-sm: 0 4px 12px rgba(15,23,42,0.04);
  --s-shadow-md: 0 12px 36px rgba(15,23,42,0.06);
  --s-shadow-lg: 0 24px 56px rgba(15,23,42,0.1);

  /* ── Transition ── */
  --s-ease: 0.2s ease;

  /* ── Color (기본 = clean) ── */
  --s-brand:      #4A90D9;
  --s-bg:         #ffffff;
  --s-bg-surface: #f8f9fa;
  --s-text:       #111827;
  --s-text-sub:   rgba(15,23,42,0.68);
  --s-text-muted: rgba(15,23,42,0.4);
  --s-border:     rgba(15,23,42,0.06);
  --s-card-bg:    rgba(255,255,255,0.92);
  --s-card-border: rgba(15,23,42,0.06);
  --s-card-shadow: 0 12px 36px rgba(15,23,42,0.06);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--s-font); -webkit-font-smoothing: antialiased; color: var(--s-text); background: var(--s-bg); }

/* ═══ MOOD: clean ═══ */
.mood--clean {
  --s-bg: #ffffff;
  --s-bg-surface: #f8f9fa;
  --s-text: #111827;
  --s-text-sub: rgba(15,23,42,0.68);
  --s-text-muted: rgba(15,23,42,0.4);
  --s-border: rgba(15,23,42,0.06);
  --s-card-bg: rgba(255,255,255,0.92);
  --s-card-border: rgba(15,23,42,0.06);
  --s-card-shadow: 0 12px 36px rgba(15,23,42,0.06);
  background: var(--s-bg);
  color: var(--s-text);
}

/* ═══ MOOD: soft ═══ */
.mood--soft {
  --s-bg: #fafafa;
  --s-bg-surface: #f0f0f0;
  --s-text: #111827;
  --s-text-sub: rgba(15,23,42,0.68);
  --s-text-muted: rgba(15,23,42,0.4);
  --s-border: rgba(15,23,42,0.06);
  --s-card-bg: rgba(255,255,255,0.95);
  --s-card-border: rgba(15,23,42,0.05);
  --s-card-shadow: 0 8px 24px rgba(15,23,42,0.05);
  background: linear-gradient(180deg, #fafafa 0%, #ffffff 100%);
  color: var(--s-text);
}

/* ═══ MOOD: dark (기본 다크 — 차분한 다크) ═══ */
.mood--dark {
  --s-bg: #0f0b07;
  --s-bg-surface: #1a1510;
  --s-text: #ffffff;
  --s-text-sub: rgba(255,255,255,0.65);
  --s-text-muted: rgba(255,255,255,0.35);
  --s-border: rgba(255,255,255,0.08);
  --s-card-bg: rgba(255,255,255,0.06);
  --s-card-border: rgba(255,255,255,0.08);
  --s-card-shadow: 0 8px 32px rgba(0,0,0,0.2);
  background: linear-gradient(180deg, #17120d 0%, #0f0b07 100%);
  color: var(--s-text);
}

/* ═══ MOOD: navy ═══ */
.mood--navy {
  --s-bg: #0c1024;
  --s-bg-surface: #141830;
  --s-text: #ffffff;
  --s-text-sub: rgba(255,255,255,0.65);
  --s-text-muted: rgba(255,255,255,0.35);
  --s-border: rgba(255,255,255,0.08);
  --s-card-bg: rgba(255,255,255,0.06);
  --s-card-border: rgba(255,255,255,0.08);
  --s-card-shadow: 0 8px 32px rgba(0,0,0,0.25);
  background: #0c1024;
  color: var(--s-text);
}

/* ═══ MODIFIER: promo (dark 위에 얹는 강조) ═══ */
.mood--dark.is-promo,
.mood--navy.is-promo {
  background:
    radial-gradient(circle at 50% 60%, color-mix(in srgb, var(--s-brand) 18%, transparent), transparent 50%),
    linear-gradient(180deg, #17120d 0%, #0f0b07 100%);
}

/* ═══ Responsive ═══ */
@media (max-width: 480px) {
  :root {
    --s-text-2xl: 28px;
    --s-text-3xl: 34px;
    --s-text-4xl: 44px;
    --s-section-pad-y: 32px;
  }
}
@media (min-width: 768px) {
  :root {
    --s-text-2xl: 42px;
    --s-section-max: 960px;
    --s-section-pad-x: 28px;
    --s-section-pad-y: 56px;
  }
}


/* ═══ Global CTA System ═══ */
.s-cta-group {
  margin-top: var(--s-space-3);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--s-space-1);
  width: 100%;
}

.s-cta {
  display: block;
  width: 100%;
  max-width: 380px;
  padding: 18px var(--s-space-3);
  border-radius: var(--s-radius-lg);
  font-family: var(--s-font);
  font-size: 16px;
  font-weight: var(--s-weight-bold);
  line-height: 1.2;
  text-align: center;
  text-decoration: none;
  cursor: pointer;
  transition: transform var(--s-ease), box-shadow var(--s-ease), background var(--s-ease);
}

/* ── Primary: 강한 전환 ── */
.s-cta--primary {
  background: var(--s-brand);
  color: #ffffff;
  border: none;
  box-shadow: 0 12px 32px color-mix(in srgb, var(--s-brand) 30%, transparent);
}

.s-cta--primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 16px 44px color-mix(in srgb, var(--s-brand) 45%, transparent);
}

/* ── Secondary: 보조 행동 ── */
.s-cta--secondary {
  background: transparent;
  color: var(--s-brand);
  border: 1.5px solid color-mix(in srgb, var(--s-brand) 25%, var(--s-border));
}

.s-cta--secondary:hover {
  background: color-mix(in srgb, var(--s-brand) 6%, transparent);
  transform: translateY(-1px);
}

/* ── Ghost: 최소 ── */
.s-cta--ghost {
  background: transparent;
  color: var(--s-text-muted);
  border: 1px solid var(--s-border);
  padding: 14px var(--s-space-3);
  font-size: var(--s-text-sm);
}

.s-cta--ghost:hover {
  color: var(--s-text-sub);
  border-color: var(--s-text-muted);
}

/* ── Micro copy ── */
.s-cta-micro {
  font-size: var(--s-text-xs);
  color: var(--s-text-muted);
  text-align: center;
  margin-top: 4px;
}

/* ── Dark/Navy mood override ── */
.mood--dark .s-cta--secondary,
.mood--navy .s-cta--secondary {
  border-color: rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.7);
}

.mood--dark .s-cta--secondary:hover,
.mood--navy .s-cta--secondary:hover {
  background: rgba(255,255,255,0.05);
}

.mood--dark .s-cta--ghost,
.mood--navy .s-cta--ghost {
  border-color: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.35);
}

.mood--dark .s-cta--ghost:hover,
.mood--navy .s-cta--ghost:hover {
  color: rgba(255,255,255,0.5);
  border-color: rgba(255,255,255,0.2);
}

.mood--dark .s-cta-micro,
.mood--navy .s-cta-micro {
  color: rgba(255,255,255,0.25);
}


/* ═══ T9 CTA — 토큰 기반 ═══ */
.ct {
  position: relative;
  overflow: hidden;
  padding: var(--s-space-6) var(--s-section-pad-x) var(--s-space-5);
  background: var(--s-bg);
  color: var(--s-text);
}

.ct__inner {
  max-width: var(--s-section-max);
  margin: 0 auto;
  position: relative;
  z-index: 2;
}

.ct__header {
  text-align: center;
  margin-bottom: var(--s-space-3);
}

.ct__badge {
  display: inline-block;
  margin-bottom: var(--s-space-2);
  padding: 6px var(--s-space-2);
  border-radius: var(--s-radius-full);
  background: color-mix(in srgb, var(--s-brand) 15%, var(--s-bg-surface));
  color: var(--s-brand);
  font-size: var(--s-text-xs);
  font-weight: var(--s-weight-bold);
}

.ct__eyebrow {
  margin: 0 0 var(--s-space-1);
  font-size: var(--s-text-xs);
  font-weight: var(--s-weight-bold);
  letter-spacing: var(--s-tracking-wide);
  text-transform: uppercase;
  color: var(--s-brand);
}

.ct__headline {
  margin: 0;
  font-size: var(--s-text-2xl);
  font-weight: var(--s-weight-black);
  line-height: var(--s-leading-tight);
  letter-spacing: var(--s-tracking-tight);
  word-break: keep-all;
  color: var(--s-text);
}

.ct__sub {
  max-width: 420px;
  margin: var(--s-space-2) auto 0;
  font-size: var(--s-text-base);
  line-height: var(--s-leading-relaxed);
  color: var(--s-text-sub);
}

.ct__body {
  text-align: center;
  max-width: 420px;
  margin: 0 auto var(--s-space-3);
  font-size: var(--s-text-base);
  line-height: var(--s-leading-relaxed);
  color: var(--s-text-sub);
}

/* Benefits */
.ct__benefits {
  list-style: none;
  padding: 0;
  margin: 0 0 var(--s-space-3);
  display: flex;
  flex-direction: column;
  gap: var(--s-space-2);
}

.ct__benefit {
  display: flex;
  align-items: center;
  gap: var(--s-space-1);
  font-size: var(--s-text-base);
  color: var(--s-text-sub);
}

.ct__benefit-icon { font-size: var(--s-text-lg); flex-shrink: 0; }

.ct__benefit-check {
  color: var(--s-brand);
  font-weight: var(--s-weight-bold);
  font-size: var(--s-text-lg);
  flex-shrink: 0;
}

/* CTA Button */
.ct__action { margin-bottom: var(--s-space-2); }

.ct__btn {
  display: block;
  width: 100%;
  padding: var(--s-space-3) var(--s-space-3);
  border: 0;
  border-radius: var(--s-radius-lg);
  font-family: var(--s-font);
  font-size: 17px;
  font-weight: var(--s-weight-bold);
  line-height: 1.2;
  text-align: center;
  text-decoration: none;
  cursor: pointer;
  background: var(--s-brand);
  color: #fff;
  box-shadow: 0 12px 36px color-mix(in srgb, var(--s-brand) 30%, transparent);
  transition: transform var(--s-ease), box-shadow var(--s-ease);
}

.ct__btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 18px 48px color-mix(in srgb, var(--s-brand) 45%, transparent);
}

.ct__btn-secondary {
  display: block;
  width: 100%;
  padding: var(--s-space-2) var(--s-space-3);
  border: 1.5px solid var(--s-border);
  border-radius: var(--s-radius-lg);
  background: transparent;
  color: var(--s-text-sub);
  text-align: center;
  text-decoration: none;
  font-size: var(--s-text-base);
  font-weight: var(--s-weight-bold);
  margin-top: var(--s-space-1);
  transition: background var(--s-ease);
}

.ct__btn-secondary:hover {
  background: color-mix(in srgb, var(--s-brand) 6%, transparent);
}

.ct__micro {
  margin-top: var(--s-space-2);
  font-size: var(--s-text-xs);
  color: var(--s-text-muted);
  text-align: center;
}

/* CTA-C: Visual Banner */
.ct--c { min-height: 320px; display: flex; align-items: center; justify-content: center; }
.ct--c .ct__bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: 0; }
.ct--c .ct__overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.55); z-index: 1; }
.ct--c .ct__content { position: relative; z-index: 2; }

@media (min-width: 768px) {
  .ct { padding: var(--s-space-8) var(--s-section-pad-x); }
  .ct__inner { max-width: 640px; }
  .ct__btn { max-width: 380px; margin: 0 auto; }
  .ct__btn-secondary { max-width: 380px; margin: var(--s-space-1) auto 0; }
}

  </style>
</head>
<body>
  <div style="max-width:960px;margin:0 auto;">
    <!-- LAYOUT: CTA-B -->
<section
  class="ct ct--b mood--dark"
  data-section="15-cta"
  data-layout="CTA-B"
  style="--s-brand:#2563EB;"
>
  <div class="ct__inner">
    
      
    <header class="ct__header">
      <span class="ct__badge">🎁 첫 구매 한정</span>
      
      <h2 class="ct__headline">지금 시작하면 특별 혜택</h2>
      <p class="ct__sub">30일 내 마음에 안 들면 전액 환불</p>
    </header>
  
      <p class="ct__body">이미 12,000명이 선택한 프리미엄 스킨케어. 지금 구매하시면 아래 혜택을 모두 받으실 수 있습니다.</p>
      
    <ul class="ct__benefits">
      
        <li class="ct__benefit">
          <span class="ct__benefit-icon" aria-hidden="true">📦</span>
          <span class="ct__benefit-text">전 상품 무료배송</span>
        </li>
      
        <li class="ct__benefit">
          <span class="ct__benefit-icon" aria-hidden="true">🔄</span>
          <span class="ct__benefit-text">30일 무조건 환불 보장</span>
        </li>
      
        <li class="ct__benefit">
          <span class="ct__benefit-icon" aria-hidden="true">🎁</span>
          <span class="ct__benefit-text">미니 사이즈 3종 증정 (15,000원 상당)</span>
        </li>
      
        <li class="ct__benefit">
          <span class="ct__benefit-icon" aria-hidden="true">💰</span>
          <span class="ct__benefit-text">다음 구매 시 5% 적립</span>
        </li>
      
    </ul>
  
      <div class="s-cta-group"><a class="s-cta s-cta--primary" href="#">혜택 받고 구매하기</a><a class="s-cta s-cta--secondary" href="#">더 알아보기</a><p class="s-cta-micro">한정 수량 소진 시 조기 마감될 수 있습니다</p></div>
    
  </div>
</section>
  </div>
</body>
</html>
