<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CTA-A 센터 dark</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Pretendard',sans-serif;display:flex;justify-content:center;min-height:100vh;background:#f0f0f0}.page{width:100%;max-width:960px}
.ct { position: relative; overflow: hidden; padding: 48px 20px 40px; --ct-brand: #4A90D9; }
.ct__inner { max-width: 520px; margin: 0 auto; position: relative; z-index: 2; }

.ct__header { text-align: center; margin-bottom: 24px; }
.ct__badge { display: inline-block; margin-bottom: 12px; padding: 6px 14px; border-radius: 999px; background: color-mix(in srgb, var(--ct-brand) 15%, transparent); color: var(--ct-brand); font-size: 12px; font-weight: 700; }
.ct__eyebrow { margin: 0 0 8px; font-size: 12px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: color-mix(in srgb, var(--ct-brand) 70%, #5f6980); }
.ct__headline { margin: 0; font-size: 34px; font-weight: 800; line-height: 1.14; letter-spacing: -0.04em; word-break: keep-all; }
.ct__sub { max-width: 420px; margin: 12px auto 0; font-size: 15px; line-height: 1.7; color: rgba(15,23,42,0.68); }
.ct__body { text-align: center; max-width: 420px; margin: 0 auto 20px; font-size: 15px; line-height: 1.7; color: rgba(15,23,42,0.6); }

.ct__benefits { list-style: none; padding: 0; margin: 0 0 24px; display: flex; flex-direction: column; gap: 12px; }
.ct__benefit { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 400; }
.ct__benefit-icon { font-size: 18px; flex-shrink: 0; }
.ct__benefit-check { color: var(--ct-brand); font-weight: 700; font-size: 16px; flex-shrink: 0; }
.ct__benefit-text { flex: 1; }

.ct__action { margin-bottom: 12px; }
.ct__btn { display: block; width: 100%; padding: 20px 24px; border: 0; border-radius: 16px; background: var(--ct-brand); color: #fff; text-align: center; text-decoration: none; font-size: 17px; font-weight: 700; line-height: 1.2; box-shadow: 0 12px 36px color-mix(in srgb, var(--ct-brand) 30%, transparent); transition: transform 0.2s ease, box-shadow 0.2s ease; }
.ct__btn:hover { transform: translateY(-2px); box-shadow: 0 18px 48px color-mix(in srgb, var(--ct-brand) 45%, transparent); }

.ct__btn-secondary { display: block; width: 100%; padding: 16px 24px; border: 1.5px solid color-mix(in srgb, var(--ct-brand) 25%, transparent); border-radius: 16px; background: transparent; color: var(--ct-brand); text-align: center; text-decoration: none; font-size: 15px; font-weight: 700; margin-top: 10px; transition: background 0.2s ease; }
.ct__btn-secondary:hover { background: color-mix(in srgb, var(--ct-brand) 6%, transparent); }

.ct__micro { margin-top: 14px; font-size: 12px; color: rgba(15,23,42,0.35); text-align: center; }

/* CTA-C: Visual Banner */
.ct--c { min-height: 320px; display: flex; align-items: center; justify-content: center; }
.ct--c .ct__bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: 0; }
.ct--c .ct__overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.55); z-index: 1; }
.ct--c .ct__content { position: relative; z-index: 2; }

/* Moods */
.ct.mood--clean { background: linear-gradient(180deg, #f8f9fa 0%, #ffffff 100%); color: #111827; }
.ct.mood--soft { background: radial-gradient(circle at 50% 50%, color-mix(in srgb, var(--ct-brand) 8%, white), transparent 60%), linear-gradient(180deg, #fff9fc 0%, #fff 100%); color: #111827; }
.ct.mood--dark { background: radial-gradient(circle at 50% 60%, color-mix(in srgb, var(--ct-brand) 18%, transparent), transparent 50%), linear-gradient(180deg, #17120d 0%, #0f0b07 100%); color: #fff; }
.ct.mood--navy { background: radial-gradient(circle at 50% 60%, color-mix(in srgb, var(--ct-brand) 18%, transparent), transparent 50%), #0c1024; color: #fff; }

.ct.mood--dark .ct__sub, .ct.mood--dark .ct__body, .ct.mood--navy .ct__sub, .ct.mood--navy .ct__body { color: rgba(255,255,255,0.65); }
.ct.mood--dark .ct__headline, .ct.mood--navy .ct__headline, .ct.mood--dark .ct__eyebrow, .ct.mood--navy .ct__eyebrow { color: #fff; }
.ct.mood--dark .ct__micro, .ct.mood--navy .ct__micro { color: rgba(255,255,255,0.25); }
.ct.mood--dark .ct__benefit, .ct.mood--navy .ct__benefit { color: rgba(255,255,255,0.8); }
.ct.mood--dark .ct__badge, .ct.mood--navy .ct__badge { background: color-mix(in srgb, var(--ct-brand) 18%, rgba(255,255,255,0.08)); }
.ct.mood--dark .ct__btn-secondary, .ct.mood--navy .ct__btn-secondary { border-color: rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); }
.ct.mood--dark .ct__btn-secondary:hover, .ct.mood--navy .ct__btn-secondary:hover { background: rgba(255,255,255,0.05); }

@media (max-width: 480px) { .ct { padding: 36px 20px 32px; } .ct__headline { font-size: 28px; } .ct__btn { font-size: 16px; padding: 18px 20px; } }
@media (min-width: 768px) { .ct { padding: 64px 28px 56px; } .ct__inner { max-width: 640px; } .ct__headline { font-size: 42px; } .ct__btn { max-width: 380px; margin: 0 auto; } .ct__btn-secondary { max-width: 380px; margin: 10px auto 0; } }
</style></head><body><div class="page"><!-- LAYOUT: CTA-A -->
<section
  class="ct ct--a mood--dark"
  data-section="15-cta"
  data-layout="CTA-A"
  style="--ct-brand:#2563EB;"
>
  <div class="ct__inner">
    
      
    <header class="ct__header">
      
      
      <h2 class="ct__headline">지금 시작하세요</h2>
      <p class="ct__sub">더 이상 망설일 이유가 없습니다.</p>
    </header>
  
      
      
    <div class="ct__action">
      <a class="ct__btn" href="#">무료 체험 시작</a>
    </div>
  
      
      <p class="ct__micro">가입 후 7일 무료 · 언제든 해지</p>
    
  </div>
</section></div></body></html>
