<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>PL-A 긴급배너 dark (23)</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Pretendard',sans-serif;display:flex;justify-content:center;min-height:100vh;background:#f0f0f0}.page{width:100%;max-width:960px}
.pl { position: relative; padding: 0; --pl-brand: #DC2626; }
.pl__inner { max-width: 520px; margin: 0 auto; text-align: center; padding: 0 20px 40px; }
.pl__urgency { width: 100%; padding: 12px 16px; background: var(--pl-brand); color: #fff; font-size: 14px; font-weight: 700; text-align: center; letter-spacing: 0.5px; }
.pl__header { padding-top: 32px; margin-bottom: 20px; }
.pl__eyebrow { margin: 0 0 8px; font-size: 12px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: color-mix(in srgb, var(--pl-brand) 70%, #5f6980); }
.pl__headline { margin: 0; font-size: 34px; font-weight: 800; line-height: 1.14; letter-spacing: -0.04em; }
.pl__sub { max-width: 420px; margin: 12px auto 0; font-size: 15px; line-height: 1.7; color: rgba(255,255,255,0.6); }
.pl__countdown { display: flex; justify-content: center; gap: 8px; margin-bottom: 16px; }
.pl__time-box { background: rgba(255,255,255,0.1); color: #fff; font-size: 32px; font-weight: 900; padding: 10px 14px; border-radius: 10px; min-width: 60px; backdrop-filter: blur(4px); }
.pl__time-sep { font-size: 24px; font-weight: 700; color: rgba(255,255,255,0.3); align-self: center; }
.pl__stock { margin-bottom: 20px; }
.pl__stock-bar { width: 80%; margin: 0 auto; height: 6px; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; }
.pl__stock-fill { height: 100%; background: var(--pl-brand); border-radius: 6px; transition: width 0.5s ease; }
.pl__stock-text { display: block; font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 6px; }
.pl__benefits { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
.pl__benefit { display: flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: 999px; background: color-mix(in srgb, var(--pl-brand) 12%, transparent); font-size: 14px; font-weight: 700; }
.pl__benefit-icon { font-size: 16px; }
.pl__cta { margin-bottom: 10px; }
.pl__cta-btn { display: block; width: 100%; padding: 20px; border: 0; border-radius: 16px; background: var(--pl-brand); color: #fff; text-align: center; text-decoration: none; font-size: 17px; font-weight: 700; box-shadow: 0 12px 36px color-mix(in srgb, var(--pl-brand) 35%, transparent); transition: transform 0.2s; }
.pl__cta-btn:hover { transform: translateY(-2px); }
.pl__micro { font-size: 12px; color: rgba(255,255,255,0.25); }
.pl.mood--clean { background: #fff; color: #111827; }
.pl.mood--clean .pl__sub { color: rgba(15,23,42,0.6); }
.pl.mood--clean .pl__time-box { background: rgba(15,23,42,0.06); color: #111827; }
.pl.mood--clean .pl__time-sep { color: rgba(15,23,42,0.2); }
.pl.mood--clean .pl__stock-bar { background: rgba(15,23,42,0.08); }
.pl.mood--clean .pl__stock-text { color: rgba(15,23,42,0.4); }
.pl.mood--clean .pl__micro { color: rgba(15,23,42,0.35); }
.pl.mood--soft { background: linear-gradient(180deg, #fafafa 0%, #fff 100%); color: #111827; }
.pl.mood--dark { background: linear-gradient(180deg, #1a0e08 0%, #0e0604 100%); color: #fff; }
.pl.mood--navy { background: #0c1024; color: #fff; }
@media (max-width: 480px) { .pl__headline { font-size: 28px; } .pl__time-box { font-size: 24px; min-width: 48px; padding: 8px 10px; } }
@media (min-width: 768px) { .pl__inner { max-width: 640px; } .pl__headline { font-size: 42px; } .pl__cta-btn { max-width: 380px; margin: 0 auto; } }
</style></head><body><div class="page"><!-- LAYOUT: PL-A -->
<section class="pl pl--a mood--dark" data-section="23-promo" data-layout="PL-A" style="--pl-brand:#DC2626;"><div class="pl__inner"><div class="pl__urgency">⏰ 오늘 자정 마감</div><header class="pl__header"><h2 class="pl__headline">한정 특가</h2><p class="pl__sub">이 가격은 다시 없습니다</p></header><div class="pl__countdown"><div class="pl__time-box">00</div><span class="pl__time-sep">:</span><div class="pl__time-box">00</div><span class="pl__time-sep">:</span><div class="pl__time-box">00</div></div><div class="pl__stock"><div class="pl__stock-bar"><div class="pl__stock-fill" style="width:73%"></div></div><span class="pl__stock-text">73% 소진</span></div><div class="pl__cta"><a class="pl__cta-btn" href="#">지금 구매하기</a></div><p class="pl__micro">한정 수량 소진 시 조기 마감</p></div></section></div></body></html>
