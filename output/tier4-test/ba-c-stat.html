<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>BA-C 수치강조 dark (09)</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Pretendard',sans-serif;display:flex;justify-content:center;min-height:100vh;background:#f0f0f0}.page{width:100%;max-width:960px}
.ba { position: relative; padding: 48px 20px 40px; --ba-brand: #4A90D9; }

.ba__placeholder { width: 100%; aspect-ratio: 1/1; border: 2px dashed rgba(15,23,42,0.1); border-radius: 16px; display: flex; align-items: center; justify-content: center; color: rgba(15,23,42,0.25); font-size: 13px; }
.ba__slider { position: relative; display: grid; grid-template-columns: 1fr 1fr; gap: 0; border-radius: 16px; overflow: hidden; }
.ba__slider-handle { position: absolute; top: 0; left: 50%; width: 4px; height: 100%; background: var(--ba-brand); transform: translateX(-50%); z-index: 2; }
.ba__stack { display: grid; gap: 16px; }
.ba__body { font-size: 15px; line-height: 1.7; color: rgba(15,23,42,0.65); text-align: center; margin-top: 16px; }
.ba__stat { text-align: center; margin-top: 12px; }

.ba__cta-btn:hover { transform: translateY(-2px); }
.ba.mood--clean { background: #fff; color: #111827; }
.ba.mood--soft { background: linear-gradient(180deg, #fafafa 0%, #fff 100%); color: #111827; }
.ba.mood--dark { background: linear-gradient(180deg, #17120d 0%, #0f0b07 100%); color: #fff; }
.ba.mood--navy { background: #0c1024; color: #fff; }

.ba.mood--dark .ba__headline, .ba.mood--dark .ba__eyebrow, .ba.mood--navy .ba__headline, .ba.mood--navy .ba__eyebrow { color: #fff; }
.ba.mood--dark .ba__img-wrap, .ba.mood--navy .ba__img-wrap { background: rgba(255,255,255,0.06); }
.ba.mood--dark .ba__placeholder, .ba.mood--navy .ba__placeholder { border-color: rgba(255,255,255,0.1); color: rgba(255,255,255,0.2); }
.ba.mood--dark .ba__stat-label, .ba.mood--navy .ba__stat-label { color: rgba(255,255,255,0.45); }
