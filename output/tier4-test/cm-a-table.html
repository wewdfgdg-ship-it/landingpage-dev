<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CM-A 비교테이블 (17)</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Pretendard',sans-serif;display:flex;justify-content:center;min-height:100vh;background:#f0f0f0}.page{width:100%;max-width:960px}
.cm { position: relative; padding: 48px 20px 40px; --cm-brand: #4A90D9; }
.cm__inner { max-width: 520px; margin: 0 auto; }
.cm__header { text-align: center; margin-bottom: 28px; }
.cm__eyebrow { margin: 0 0 8px; font-size: 12px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: color-mix(in srgb, var(--cm-brand) 70%, #5f6980); }
.cm__headline { margin: 0; font-size: 34px; font-weight: 800; line-height: 1.14; letter-spacing: -0.04em; }
.cm__sub { max-width: 420px; margin: 12px auto 0; font-size: 15px; line-height: 1.7; color: rgba(15,23,42,0.68); }
.cm__table { width: 100%; border-collapse: collapse; }
.cm__table th { padding: 12px 8px; font-size: 14px; font-weight: 700; border-bottom: 2px solid rgba(15,23,42,0.1); }
.cm__th--ours { color: var(--cm-brand); }
.cm__th--theirs { color: rgba(15,23,42,0.4); }
.cm__row { border-bottom: 1px solid rgba(15,23,42,0.06); }
.cm__cell { padding: 14px 8px; font-size: 14px; vertical-align: middle; }
.cm__cell--label { font-weight: 700; color: rgba(15,23,42,0.7); }
.cm__cell--ours { font-weight: 700; color: var(--cm-brand); text-align: center; }
.cm__cell--theirs { color: rgba(15,23,42,0.4); text-align: center; }
.cm__cards { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 14px; }
.cm__card { padding: 24px 20px; border-radius: 20px; }
.cm__card--ours { background: color-mix(in srgb, var(--cm-brand) 6%, white); border: 2px solid color-mix(in srgb, var(--cm-brand) 20%, transparent); }
.cm__card--theirs { background: rgba(15,23,42,0.03); border: 1px solid rgba(15,23,42,0.06); }
.cm__card-name { font-size: 16px; font-weight: 800; margin: 0 0 14px; }
.cm__card--ours .cm__card-name { color: var(--cm-brand); }
.cm__card-list { list-style: none; padding: 0; margin: 0; }
.cm__card-item { padding: 8px 0; font-size: 14px; border-bottom: 1px solid rgba(15,23,42,0.04); }
.cm__card-item--yes { font-weight: 700; }
.cm__cta { margin-top: 24px; text-align: center; }
.cm__cta-btn { display: inline-block; padding: 14px 32px; border: 0; border-radius: 14px; background: var(--cm-brand); color: #fff; text-decoration: none; font-size: 15px; font-weight: 700; transition: transform 0.2s; }
.cm__cta-btn:hover { transform: translateY(-2px); }
.cm.mood--clean { background: #fff; color: #111827; }
.cm.mood--soft { background: linear-gradient(180deg, #fafafa 0%, #fff 100%); color: #111827; }
.cm.mood--dark { background: linear-gradient(180deg, #17120d 0%, #0f0b07 100%); color: #fff; }
.cm.mood--dark .cm__table th { border-color: rgba(255,255,255,0.1); }
.cm.mood--dark .cm__row { border-color: rgba(255,255,255,0.06); }
.cm.mood--dark .cm__cell--label { color: rgba(255,255,255,0.6); }
.cm.mood--dark .cm__cell--theirs, .cm.mood--dark .cm__th--theirs { color: rgba(255,255,255,0.3); }
.cm.mood--dark .cm__card--ours { background: color-mix(in srgb, var(--cm-brand) 8%, transparent); border-color: color-mix(in srgb, var(--cm-brand) 25%, transparent); }
.cm.mood--dark .cm__card--theirs { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.06); }
.cm.mood--dark .cm__sub { color: rgba(255,255,255,0.55); }
.cm.mood--navy { background: #0c1024; color: #fff; }
@media (max-width: 480px) { .cm { padding: 36px 20px 32px; } .cm__headline { font-size: 28px; } .cm__cards { grid-template-columns: 1fr; } }
@media (min-width: 768px) { .cm { padding: 64px 28px 56px; } .cm__inner { max-width: 720px; } .cm__headline { font-size: 42px; } }
</style></head><body><div class="page"><!-- LAYOUT: CM-A -->
<section class="cm cm--a mood--clean" data-section="17-comparison" data-layout="CM-A" style="--cm-brand:#2563EB;"><div class="cm__inner"><header class="cm__header"><h2 class="cm__headline">왜 우리 제품인가</h2></header><table class="cm__table"><thead><tr><th></th><th class="cm__th--ours">프리미엄 세럼</th><th class="cm__th--theirs">일반 세럼</th></tr></thead><tbody><tr class="cm__row"><td class="cm__cell cm__cell--label">히알루론산 함량</td><td class="cm__cell cm__cell--ours">5중 복합</td><td class="cm__cell cm__cell--theirs">단일</td></tr><tr class="cm__row"><td class="cm__cell cm__cell--label">임상 인증</td><td class="cm__cell cm__cell--ours">✅</td><td class="cm__cell cm__cell--theirs">❌</td></tr><tr class="cm__row"><td class="cm__cell cm__cell--label">무방부제</td><td class="cm__cell cm__cell--ours">✅</td><td class="cm__cell cm__cell--theirs">❌</td></tr><tr class="cm__row"><td class="cm__cell cm__cell--label">가격</td><td class="cm__cell cm__cell--ours">29,000원</td><td class="cm__cell cm__cell--theirs">35,000원</td></tr></tbody></table></div></section></div></body></html>
